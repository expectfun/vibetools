<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>echomaze</title>
    <style>
      :root {
        --bg-top: #121826;
        --bg-bottom: #1d2742;
        --panel: rgba(16, 22, 36, 0.76);
        --panel-border: rgba(160, 190, 255, 0.16);
        --panel-soft: rgba(8, 12, 22, 0.42);
        --line: rgba(135, 163, 255, 0.18);
        --text: #eef2ff;
        --muted: #9ca8c7;
        --muted-strong: #c6d0ea;
        --accent: #7de2ff;
        --accent-strong: #4db9ff;
        --accent-soft: rgba(125, 226, 255, 0.14);
        --danger: #ff7d7d;
        --shadow: 0 24px 80px rgba(6, 10, 20, 0.42);
        --radius-xl: 24px;
        --radius-lg: 18px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at top, rgba(125, 226, 255, 0.18), transparent 26%),
          linear-gradient(145deg, var(--bg-top), var(--bg-bottom));
        color: var(--text);
        font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }

      body {
        min-height: 100dvh;
      }

      .page {
        width: min(1120px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 40px 0 64px;
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 24px;
        color: var(--muted);
        text-decoration: none;
        font-size: 0.95rem;
        transition: color 140ms ease, transform 140ms ease;
      }

      .back-link:hover,
      .back-link:focus-visible {
        color: var(--accent-strong);
        outline: none;
        transform: translateX(-2px);
      }

      .hero {
        margin-bottom: 28px;
      }

      .hero h1 {
        margin: 0 0 12px;
        font-size: clamp(2.4rem, 6vw, 4rem);
        line-height: 0.93;
        letter-spacing: -0.05em;
      }

      .hero p {
        margin: 0;
        max-width: 52ch;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.65;
      }

      .stage {
        position: relative;
        border: 1px solid var(--line);
        border-radius: 26px;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 30%, rgba(39, 72, 142, 0.14), transparent 35%),
          rgba(2, 4, 12, 0.88);
        box-shadow: 0 30px 70px rgba(0, 0, 0, 0.35);
      }

      .controls {
        position: absolute;
        top: 16px;
        right: 16px;
        z-index: 2;
      }

      .button {
        appearance: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 11px 24px;
        border: none;
        border-radius: 999px;
        font: inherit;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 140ms ease, transform 120ms ease, border-color 140ms ease;
      }

      .button:active {
        transform: scale(0.97);
      }

      .button-primary {
        background: var(--accent-soft);
        color: var(--accent);
        border: 1px solid rgba(125, 226, 255, 0.25);
      }

      .button-primary:hover {
        background: rgba(125, 226, 255, 0.22);
        border-color: rgba(125, 226, 255, 0.4);
      }

      canvas {
        display: block;
        width: 100%;
        height: auto;
      }

      .overlay {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        min-width: 260px;
        max-width: min(420px, calc(100% - 32px));
        padding: 14px 18px;
        border-radius: 18px;
        background: rgba(5, 9, 20, 0.9);
        border: 1px solid rgba(115, 240, 255, 0.28);
        color: var(--text);
        font-size: 1rem;
        text-align: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 180ms ease, transform 180ms ease;
      }

      .overlay.is-visible {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }

      .overlay strong {
        color: var(--text);
      }

      @media (max-width: 760px) {
        .page {
          width: min(100vw - 20px, 1120px);
          padding-top: 28px;
          padding-bottom: 48px;
        }

        .controls {
          top: 12px;
          right: 12px;
        }

        .button {
          padding-inline: 18px;
        }

        .overlay {
          min-width: 0;
          max-width: calc(100% - 24px);
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <a class="back-link" href="./index.html">← all tools</a>

      <section class="hero">
        <h1>echomaze</h1>
        <p>Find the exit by sound (arrow keys + space).</p>
      </section>

      <section class="stage">
        <div class="controls">
          <button class="button button-primary" id="new-maze" type="button">New Maze</button>
        </div>
          <canvas id="game" width="960" height="640" aria-label="Echo Labyrinth"></canvas>
        <div class="overlay" id="message"></div>
      </section>
    </main>

    <script>
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");
      const message = document.getElementById("message");
      const newMazeButton = document.getElementById("new-maze");

      const WORLD = {
        width: 960,
        height: 640,
      };

      const MATERIALS = {
        metal: { color: "#89f7ff", reflectivity: 1.15, label: "Metal" },
        stone: { color: "#86a7ff", reflectivity: 0.9, label: "Stone" },
        cloth: { color: "#b08cff", reflectivity: 0.55, label: "Cloth" },
      };

      const MAZE = {
        cols: 8,
        rows: 5,
        wall: 16,
        cell: 92,
      };

      const materialNames = Object.keys(MATERIALS);

      const player = {
        x: 86,
        y: 94,
        radius: 10,
        speed: 220,
      };

      let walls = [];
      let exit = { x: 0, y: 0, w: 0, h: 0 };
      let spawnPoint = { x: 86, y: 94 };

      const state = {
        keys: new Set(),
        pulses: [],
        discoveredExit: false,
        won: false,
        winAt: 0,
        lastTime: 0,
        announcement: "",
      };

      const PULSE = {
        speed: 330,
        thickness: 34,
        maxRadius: 280,
        fadeDistance: 190,
      };

      const AUDIO = {
        speedOfSound: PULSE.speed,
        maxEchoDistance: 520,
        maxEchoVoices: 7,
      };

      let audioContext;
      let masterGain;
      let noiseBuffer;
      let audioUnlocked = false;

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function choice(items) {
        return items[Math.floor(Math.random() * items.length)];
      }

      function randomMaterial() {
        return choice(materialNames);
      }

      function getMazeOffsets() {
        const mazeWidth = MAZE.cols * MAZE.cell + (MAZE.cols + 1) * MAZE.wall;
        const mazeHeight = MAZE.rows * MAZE.cell + (MAZE.rows + 1) * MAZE.wall;

        return {
          x: Math.floor((WORLD.width - mazeWidth) * 0.5),
          y: Math.floor((WORLD.height - mazeHeight) * 0.5),
          width: mazeWidth,
          height: mazeHeight,
        };
      }

      function getCellCenter(col, row) {
        const offsets = getMazeOffsets();

        return {
          x: offsets.x + MAZE.wall + col * (MAZE.cell + MAZE.wall) + MAZE.cell * 0.5,
          y: offsets.y + MAZE.wall + row * (MAZE.cell + MAZE.wall) + MAZE.cell * 0.5,
        };
      }

      function buildMazeLevel() {
        const cells = Array.from({ length: MAZE.rows }, () =>
          Array.from({ length: MAZE.cols }, () => ({
            visited: false,
            open: { top: false, right: false, bottom: false, left: false },
          })),
        );

        const directions = [
          { key: "top", opposite: "bottom", dx: 0, dy: -1 },
          { key: "right", opposite: "left", dx: 1, dy: 0 },
          { key: "bottom", opposite: "top", dx: 0, dy: 1 },
          { key: "left", opposite: "right", dx: -1, dy: 0 },
        ];

        const stack = [{ col: 0, row: 0 }];
        cells[0][0].visited = true;

        while (stack.length) {
          const current = stack[stack.length - 1];
          const neighbors = directions
            .map((direction) => ({
              ...direction,
              col: current.col + direction.dx,
              row: current.row + direction.dy,
            }))
            .filter(
              ({ col, row }) =>
                col >= 0 &&
                col < MAZE.cols &&
                row >= 0 &&
                row < MAZE.rows &&
                !cells[row][col].visited,
            );

          if (!neighbors.length) {
            stack.pop();
            continue;
          }

          const next = choice(neighbors);
          cells[current.row][current.col].open[next.key] = true;
          cells[next.row][next.col].open[next.opposite] = true;
          cells[next.row][next.col].visited = true;
          stack.push({ col: next.col, row: next.row });
        }

        const distances = Array.from({ length: MAZE.rows }, () =>
          Array.from({ length: MAZE.cols }, () => Infinity),
        );
        const queue = [{ col: 0, row: 0 }];
        distances[0][0] = 0;

        while (queue.length) {
          const current = queue.shift();
          const cell = cells[current.row][current.col];

          for (const direction of directions) {
            if (!cell.open[direction.key]) {
              continue;
            }

            const nextCol = current.col + direction.dx;
            const nextRow = current.row + direction.dy;
            if (distances[nextRow][nextCol] !== Infinity) {
              continue;
            }

            distances[nextRow][nextCol] = distances[current.row][current.col] + 1;
            queue.push({ col: nextCol, row: nextRow });
          }
        }

        let farthest = { col: 0, row: 0, distance: -1 };
        for (let row = 0; row < MAZE.rows; row += 1) {
          for (let col = 0; col < MAZE.cols; col += 1) {
            if (distances[row][col] > farthest.distance) {
              farthest = { col, row, distance: distances[row][col] };
            }
          }
        }

        const offsets = getMazeOffsets();
        const nextWalls = [];
        const addWall = (x, y, w, h) => {
          nextWalls.push({ x, y, w, h, material: randomMaterial() });
        };

        addWall(offsets.x, offsets.y, offsets.width, MAZE.wall);
        addWall(offsets.x, offsets.y + offsets.height - MAZE.wall, offsets.width, MAZE.wall);
        addWall(offsets.x, offsets.y, MAZE.wall, offsets.height);
        addWall(offsets.x + offsets.width - MAZE.wall, offsets.y, MAZE.wall, offsets.height);

        for (let row = 0; row < MAZE.rows; row += 1) {
          for (let col = 0; col < MAZE.cols; col += 1) {
            const cell = cells[row][col];
            const cellX = offsets.x + MAZE.wall + col * (MAZE.cell + MAZE.wall);
            const cellY = offsets.y + MAZE.wall + row * (MAZE.cell + MAZE.wall);

            if (col < MAZE.cols - 1 && !cell.open.right) {
              addWall(cellX + MAZE.cell, cellY, MAZE.wall, MAZE.cell);
            }

            if (row < MAZE.rows - 1 && !cell.open.bottom) {
              addWall(cellX, cellY + MAZE.cell, MAZE.cell, MAZE.wall);
            }
          }
        }

        walls = nextWalls;
        spawnPoint = getCellCenter(0, 0);
        player.x = spawnPoint.x;
        player.y = spawnPoint.y;

        const exitCenter = getCellCenter(farthest.col, farthest.row);
        exit = {
          x: exitCenter.x - 18,
          y: exitCenter.y - 30,
          w: 36,
          h: 60,
        };
      }

      function resetRun() {
        player.x = spawnPoint.x;
        player.y = spawnPoint.y;
        state.keys.clear();
        state.pulses = [];
        state.discoveredExit = false;
        state.won = false;
        state.winAt = 0;
        state.announcement = "";
        emitPulse();
      }

      function generateNewMaze() {
        buildMazeLevel();
        resetRun();
      }

      function ensureAudio() {
        if (!audioContext) {
          const AudioContextClass = window.AudioContext || window.webkitAudioContext;
          if (!AudioContextClass) {
            return null;
          }

          audioContext = new AudioContextClass();
          masterGain = audioContext.createGain();
          masterGain.gain.value = 0.18;
          masterGain.connect(audioContext.destination);

          const bufferSize = audioContext.sampleRate * 0.45;
          noiseBuffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
          const data = noiseBuffer.getChannelData(0);
          for (let i = 0; i < bufferSize; i += 1) {
            data[i] = Math.random() * 2 - 1;
          }
        }

        if (audioContext.state === "suspended") {
          audioContext.resume();
        }

        audioUnlocked = true;
        return audioContext;
      }

      function makeGainEnvelope(gainNode, startAt, peak, attack, release) {
        gainNode.gain.setValueAtTime(0.0001, startAt);
        gainNode.gain.exponentialRampToValueAtTime(peak, startAt + attack);
        gainNode.gain.exponentialRampToValueAtTime(0.0001, startAt + attack + release);
      }

      function playPulseSound() {
        const context = ensureAudio();
        if (!context || !masterGain) {
          return;
        }

        const now = context.currentTime;
        const osc = context.createOscillator();
        const gain = context.createGain();
        const filter = context.createBiquadFilter();

        osc.type = "triangle";
        osc.frequency.setValueAtTime(280, now);
        osc.frequency.exponentialRampToValueAtTime(640, now + 0.08);

        filter.type = "bandpass";
        filter.frequency.setValueAtTime(920, now);
        filter.Q.value = 2.4;

        makeGainEnvelope(gain, now, 0.12, 0.01, 0.18);

        osc.connect(filter);
        filter.connect(gain);
        gain.connect(masterGain);

        osc.start(now);
        osc.stop(now + 0.24);
      }

      function playMaterialEcho(materialName, delay, strength) {
        const context = ensureAudio();
        if (!context || !masterGain || !noiseBuffer) {
          return;
        }

        const materialProfiles = {
          metal: { type: "sine", frequency: 1200, decay: 0.32, q: 8, gain: 0.065 },
          stone: { type: "triangle", frequency: 540, decay: 0.22, q: 4.5, gain: 0.05 },
          cloth: { type: "sawtooth", frequency: 240, decay: 0.14, q: 1.2, gain: 0.03 },
        };

        const profile = materialProfiles[materialName];
        const startAt = context.currentTime + delay;

        const osc = context.createOscillator();
        const oscGain = context.createGain();
        const filter = context.createBiquadFilter();
        const noise = context.createBufferSource();
        const noiseFilter = context.createBiquadFilter();
        const noiseGain = context.createGain();

        osc.type = profile.type;
        osc.frequency.setValueAtTime(profile.frequency, startAt);
        osc.detune.setValueAtTime((Math.random() - 0.5) * 45, startAt);

        filter.type = "bandpass";
        filter.frequency.setValueAtTime(profile.frequency, startAt);
        filter.Q.value = profile.q;

        noise.buffer = noiseBuffer;
        noiseFilter.type = materialName === "cloth" ? "lowpass" : "bandpass";
        noiseFilter.frequency.setValueAtTime(
          materialName === "metal" ? 2200 : materialName === "stone" ? 900 : 320,
          startAt,
        );
        noiseGain.gain.setValueAtTime(0.0001, startAt);
        noiseGain.gain.exponentialRampToValueAtTime(
          clamp(profile.gain * 0.7 * strength, 0.0001, 0.06),
          startAt + 0.01,
        );
        noiseGain.gain.exponentialRampToValueAtTime(0.0001, startAt + profile.decay);

        makeGainEnvelope(
          oscGain,
          startAt,
          clamp(profile.gain * strength, 0.0001, 0.08),
          0.012,
          profile.decay,
        );

        osc.connect(filter);
        filter.connect(oscGain);
        oscGain.connect(masterGain);

        noise.connect(noiseFilter);
        noiseFilter.connect(noiseGain);
        noiseGain.connect(masterGain);

        osc.start(startAt);
        osc.stop(startAt + profile.decay + 0.08);
        noise.start(startAt);
        noise.stop(startAt + profile.decay + 0.04);
      }

      function playExitRevealSound() {
        const context = ensureAudio();
        if (!context || !masterGain) {
          return;
        }

        const now = context.currentTime;
        const osc = context.createOscillator();
        const gain = context.createGain();

        osc.type = "sine";
        osc.frequency.setValueAtTime(460, now);
        osc.frequency.exponentialRampToValueAtTime(920, now + 0.18);
        makeGainEnvelope(gain, now, 0.09, 0.02, 0.3);

        osc.connect(gain);
        gain.connect(masterGain);
        osc.start(now);
        osc.stop(now + 0.34);
      }

      function playWinSound() {
        const context = ensureAudio();
        if (!context || !masterGain) {
          return;
        }

        const now = context.currentTime;
        const notes = [440, 554.37, 659.25];
        for (let i = 0; i < notes.length; i += 1) {
          const osc = context.createOscillator();
          const gain = context.createGain();
          const startAt = now + i * 0.08;
          osc.type = "triangle";
          osc.frequency.setValueAtTime(notes[i], startAt);
          makeGainEnvelope(gain, startAt, 0.08, 0.01, 0.24);
          osc.connect(gain);
          gain.connect(masterGain);
          osc.start(startAt);
          osc.stop(startAt + 0.28);
        }
      }

      function schedulePulseEchoes(originX, originY) {
        if (!audioUnlocked) {
          return;
        }

        const audibleWalls = walls
          .map((wall) => ({
            wall,
            distance: circleRectDistance(originX, originY, wall),
          }))
          .filter(({ distance }) => distance > 16 && distance < AUDIO.maxEchoDistance)
          .sort((a, b) => a.distance - b.distance)
          .slice(0, AUDIO.maxEchoVoices);

        for (const { wall, distance } of audibleWalls) {
          const strength = clamp(1 - distance / AUDIO.maxEchoDistance, 0.18, 1);
          const delay = distance / AUDIO.speedOfSound;
          playMaterialEcho(wall.material, delay, strength);
        }
      }

      function circleRectDistance(cx, cy, rect) {
        const dx = Math.max(rect.x - cx, 0, cx - (rect.x + rect.w));
        const dy = Math.max(rect.y - cy, 0, cy - (rect.y + rect.h));
        return Math.hypot(dx, dy);
      }

      function intersectsCircleRect(cx, cy, radius, rect) {
        return circleRectDistance(cx, cy, rect) <= radius;
      }

      function intersectsRect(a, b) {
        return (
          a.x < b.x + b.w &&
          a.x + a.w > b.x &&
          a.y < b.y + b.h &&
          a.y + a.h > b.y
        );
      }

      function collides(nextX, nextY) {
        const bounds = {
          x: nextX - player.radius,
          y: nextY - player.radius,
          w: player.radius * 2,
          h: player.radius * 2,
        };

        return walls.some((wall) => intersectsRect(bounds, wall));
      }

      function emitPulse() {
        if (state.won) {
          return;
        }

        state.pulses.push({
          x: player.x,
          y: player.y,
          radius: 0,
          age: 0,
        });

        playPulseSound();
        schedulePulseEchoes(player.x, player.y);
      }

      function handleInput(delta) {
        if (state.won) {
          return;
        }

        let moveX = 0;
        let moveY = 0;

        if (state.keys.has("w") || state.keys.has("arrowup")) moveY -= 1;
        if (state.keys.has("s") || state.keys.has("arrowdown")) moveY += 1;
        if (state.keys.has("a") || state.keys.has("arrowleft")) moveX -= 1;
        if (state.keys.has("d") || state.keys.has("arrowright")) moveX += 1;

        if (moveX === 0 && moveY === 0) {
          return;
        }

        const length = Math.hypot(moveX, moveY);
        moveX /= length;
        moveY /= length;

        const step = player.speed * delta;
        const nextX = clamp(player.x + moveX * step, player.radius, WORLD.width - player.radius);
        if (!collides(nextX, player.y)) {
          player.x = nextX;
        }

        const nextY = clamp(player.y + moveY * step, player.radius, WORLD.height - player.radius);
        if (!collides(player.x, nextY)) {
          player.y = nextY;
        }
      }

      function updatePulses(delta) {
        for (const pulse of state.pulses) {
          pulse.age += delta;
          pulse.radius += PULSE.speed * delta;
        }

        state.pulses = state.pulses.filter((pulse) => pulse.radius < PULSE.maxRadius);
      }

      function updateWinState(now) {
        if (state.won) {
          return;
        }

        const playerBox = {
          x: player.x - player.radius,
          y: player.y - player.radius,
          w: player.radius * 2,
          h: player.radius * 2,
        };

        if (intersectsRect(playerBox, exit)) {
          state.won = true;
          state.winAt = now;
          state.announcement = "Exit reached";
          playWinSound();

          state.pulses.push({
            x: player.x,
            y: player.y,
            radius: 0,
            age: 0,
          });
        }
      }

      function wallGlow(wall) {
        let brightness = 0;

        for (const pulse of state.pulses) {
          const distance = circleRectDistance(pulse.x, pulse.y, wall);
          const edge = Math.abs(distance - pulse.radius);
          if (edge > PULSE.thickness) {
            continue;
          }

          const waveStrength = 1 - edge / PULSE.thickness;
          const ageFade = Math.max(0.2, 1 - pulse.radius / PULSE.maxRadius);
          brightness = Math.max(
            brightness,
            waveStrength * ageFade * MATERIALS[wall.material].reflectivity,
          );
        }

        return clamp(brightness, 0, 1);
      }

      function exitGlow() {
        let brightness = 0;

        for (const pulse of state.pulses) {
          const distance = circleRectDistance(pulse.x, pulse.y, exit);
          const edge = Math.abs(distance - pulse.radius);
          if (edge > PULSE.thickness * 1.4) {
            continue;
          }
          brightness = Math.max(brightness, 1 - edge / (PULSE.thickness * 1.4));
        }

        if (state.won) {
          const celebration = 0.35 + 0.25 * Math.sin((performance.now() - state.winAt) * 0.01);
          brightness = Math.max(brightness, celebration);
        }

        return brightness;
      }

      function pulseTouchesExit() {
        return state.pulses.some((pulse) =>
          intersectsCircleRect(pulse.x, pulse.y, pulse.radius, exit),
        );
      }

      function drawBackground() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
        gradient.addColorStop(0, "#030611");
        gradient.addColorStop(1, "#02030a");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }

      function drawWalls() {
        for (const wall of walls) {
          const material = MATERIALS[wall.material];
          const glow = wallGlow(wall);
          if (glow <= 0.001) {
            continue;
          }

          ctx.fillStyle = `rgba(4, 8, 18, ${0.08 + glow * 0.2})`;
          ctx.fillRect(wall.x, wall.y, wall.w, wall.h);

          ctx.strokeStyle = material.color;
          ctx.lineWidth = 1 + glow * 3.4;
          ctx.globalAlpha = glow * 0.96;
          ctx.strokeRect(wall.x + 0.5, wall.y + 0.5, wall.w - 1, wall.h - 1);
          ctx.globalAlpha = 1;

          if (glow > 0.1) {
            ctx.shadowBlur = 24 * glow;
            ctx.shadowColor = material.color;
            ctx.strokeStyle = material.color;
            ctx.lineWidth = 1 + glow * 6;
            ctx.globalAlpha = 0.15 + glow * 0.25;
            ctx.strokeRect(wall.x + 0.5, wall.y + 0.5, wall.w - 1, wall.h - 1);
            ctx.shadowBlur = 0;
            ctx.globalAlpha = 1;
          }
        }
      }

      function drawExit() {
        const glow = exitGlow();
        if (glow <= 0.001) {
          return;
        }

        ctx.save();
        ctx.fillStyle = `rgba(88, 255, 166, ${glow * 0.34})`;
        ctx.fillRect(exit.x, exit.y, exit.w, exit.h);

        ctx.strokeStyle = `rgba(88, 255, 166, ${glow * 0.96})`;
        ctx.lineWidth = 1.5 + glow * 4;
        ctx.shadowBlur = 26 * glow;
        ctx.shadowColor = "#6bffb8";
        ctx.strokeRect(exit.x, exit.y, exit.w, exit.h);
        ctx.restore();
      }

      function drawPulses() {
        for (const pulse of state.pulses) {
          const alpha = Math.max(0, 0.22 - pulse.radius / (PULSE.maxRadius * 4));
          ctx.beginPath();
          ctx.arc(pulse.x, pulse.y, pulse.radius, 0, Math.PI * 2);
          ctx.strokeStyle = `rgba(115, 240, 255, ${alpha})`;
          ctx.lineWidth = 2;
          ctx.stroke();
        }
      }

      function drawPlayer() {
        ctx.save();
        ctx.fillStyle = "#ebf6ff";
        ctx.shadowBlur = 18;
        ctx.shadowColor = "#79efff";
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawVignette() {
        const gradient = ctx.createRadialGradient(
          canvas.width * 0.5,
          canvas.height * 0.42,
          120,
          canvas.width * 0.5,
          canvas.height * 0.5,
          760,
        );
        gradient.addColorStop(0, "rgba(0, 0, 0, 0.14)");
        gradient.addColorStop(0.65, "rgba(0, 0, 0, 0.34)");
        gradient.addColorStop(1, "rgba(0, 0, 0, 0.56)");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }

      function updateMessage() {
        if (state.won) {
          message.classList.add("is-visible");
          message.innerHTML =
            "<strong>Exit reached.</strong><br>The maze finally blinked first.";
          return;
        }

        const exitVisible = pulseTouchesExit();
        if (exitVisible && !state.discoveredExit) {
          state.discoveredExit = true;
          playExitRevealSound();
        }

        message.classList.remove("is-visible");
        message.innerHTML = "";
      }

      function render() {
        drawBackground();
        drawExit();
        drawWalls();
        drawPulses();
        drawVignette();
        drawPlayer();
        updateMessage();
      }

      function frame(now) {
        if (!state.lastTime) {
          state.lastTime = now;
        }

        const delta = Math.min(0.032, (now - state.lastTime) / 1000);
        state.lastTime = now;

        handleInput(delta);
        updatePulses(delta);
        updateWinState(now);
        render();

        requestAnimationFrame(frame);
      }

      window.addEventListener("keydown", (event) => {
        const key = event.key.toLowerCase();

        if ([" ", "arrowup", "arrowdown", "arrowleft", "arrowright"].includes(key)) {
          event.preventDefault();
        }

        if (key === " ") {
          if (!event.repeat) {
            emitPulse();
          }
          return;
        }

        state.keys.add(key);
      });

      window.addEventListener("keyup", (event) => {
        state.keys.delete(event.key.toLowerCase());
      });

      newMazeButton.addEventListener("click", () => {
        generateNewMaze();
      });

      generateNewMaze();
      requestAnimationFrame(frame);
    </script>
  </body>
</html>
