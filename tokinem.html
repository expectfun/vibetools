<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>tokinem</title>
  <style>
    :root {
      --bg-top: #121826;
      --bg-bottom: #1d2742;
      --panel: rgba(16, 22, 36, 0.76);
      --panel-border: rgba(160, 190, 255, 0.16);
      --panel-soft: rgba(8, 12, 22, 0.42);
      --text: #eef2ff;
      --muted: #9ca8c7;
      --muted-strong: #c6d0ea;
      --accent: #7de2ff;
      --accent-strong: #4db9ff;
      --accent-soft: rgba(125, 226, 255, 0.14);
      --shadow: 0 24px 80px rgba(6, 10, 20, 0.42);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100dvh;
      font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(125, 226, 255, 0.16), transparent 28%),
        linear-gradient(145deg, var(--bg-top), var(--bg-bottom));
    }

    .page {
      width: min(700px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 40px 0 72px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 24px;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.95rem;
      transition: color 140ms ease, transform 140ms ease;
    }

    .back-link:hover,
    .back-link:focus-visible {
      color: var(--accent-strong);
      outline: none;
      transform: translateX(-2px);
    }

    .hero {
      margin-bottom: 32px;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: clamp(2.4rem, 6vw, 4rem);
      line-height: 0.93;
      letter-spacing: -0.05em;
    }

    .hero p {
      margin: 0;
      max-width: 52ch;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.65;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px);
      padding: 28px 28px 32px;
    }

    .hero-counter {
      display: flex;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 10px 12px;
      margin-bottom: 20px;
    }

    .hero-counter-value {
      font-size: clamp(2.4rem, 5vw, 3.2rem);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.03em;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
    }

    .hero-counter-suffix {
      font-size: 1rem;
      line-height: 1.35;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    #text-input {
      width: 100%;
      min-height: 280px;
      resize: vertical;
      padding: 22px 20px;
      border-radius: var(--radius-lg);
      border: 1px solid rgba(255, 255, 255, 0.08);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01)),
        var(--panel-soft);
      color: var(--text);
      font-family: ui-monospace, "Cascadia Code", "Segoe UI Mono", monospace;
      font-size: 0.95rem;
      line-height: 1.65;
    }

    #text-input::placeholder {
      color: rgba(198, 208, 234, 0.6);
    }

    #text-input:focus-visible {
      outline: 1px solid rgba(125, 226, 255, 0.45);
      border-color: rgba(125, 226, 255, 0.35);
    }

    .stats-heading {
      margin: 0 0 14px;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted-strong);
    }

    .tokens-block {
      margin-top: 28px;
    }

    #tokens {
      min-height: 120px;
      max-height: 320px;
      overflow: auto;
      padding: 18px 16px;
      border-radius: var(--radius-lg);
      border: 1px solid rgba(255, 255, 255, 0.08);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01)),
        var(--panel-soft);
      line-height: 1.85;
      font-family: ui-monospace, "Cascadia Code", "Segoe UI Mono", monospace;
      font-size: 0.82rem;
      word-break: break-all;
    }

    .token {
      display: inline;
      margin: 0 3px 5px 0;
      padding: 3px 6px;
      border-radius: var(--radius-md);
      border: 1px solid rgba(160, 190, 255, 0.2);
      cursor: pointer;
      color: var(--text);
      transition: filter 120ms ease, box-shadow 120ms ease;
    }

    .token:hover {
      filter: brightness(1.12);
      box-shadow: 0 0 0 1px rgba(125, 226, 255, 0.25);
    }

    .token--selected {
      outline: 2px solid var(--accent-strong);
      outline-offset: 1px;
    }

    .stats-heading--below-preview {
      margin-top: 22px;
      margin-bottom: 10px;
    }

    #inspector {
      margin-top: 0;
      padding: 14px 16px;
      border-radius: var(--radius-md);
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(6, 10, 18, 0.35);
    }

    #inspector pre {
      margin: 0;
      font-size: 0.82rem;
      white-space: pre-wrap;
      word-break: break-all;
      color: var(--muted-strong);
      font-family: ui-monospace, "Cascadia Code", "Segoe UI Mono", monospace;
    }

    #inspector .hint {
      margin: 0;
      font-size: 0.9rem;
      color: var(--muted);
    }

    @media (max-width: 600px) {
      .page {
        width: min(100vw - 20px, 700px);
        padding-top: 28px;
        padding-bottom: 48px;
      }

      .panel {
        padding: 20px 18px 24px;
      }

      #text-input {
        min-height: 200px;
        font-size: 1.02rem;
      }
    }
  </style>
</head>

  <script>
// src/bpe.ts
var textEncoder = new TextEncoder;
var textDecoder = new TextDecoder;
function stringToBytes(s) {
  return textEncoder.encode(s);
}
function pairKey(a, b) {
  return `${a},${b}`;
}
function mergeRankMap(merges) {
  const map = new Map;
  merges.forEach(([a, b], i) => map.set(pairKey(a, b), i));
  return map;
}
function encodeWithMerges(byteIds, merges) {
  const ranks = mergeRankMap(merges);
  let seq = byteIds.slice();
  while (true) {
    let bestRank = Infinity;
    let bestPos = -1;
    for (let i = 0;i < seq.length - 1; i++) {
      const r = ranks.get(pairKey(seq[i], seq[i + 1]));
      if (r !== undefined && r < bestRank) {
        bestRank = r;
        bestPos = i;
      }
    }
    if (bestPos === -1)
      break;
    const newId = 256 + bestRank;
    seq = [
      ...seq.slice(0, bestPos),
      newId,
      ...seq.slice(bestPos + 2)
    ];
  }
  return seq;
}
function encode(text, merges) {
  const bytes = stringToBytes(text);
  const ids = Array.from(bytes);
  return encodeWithMerges(ids, merges);
}
function vocabFromJson(rows) {
  return rows.map((r) => new Uint8Array(r));
}

// src/browser-entry.ts
function hueForId(id) {
  const h = id * 997 % 360;
  return `hsl(${h} 48% 24%)`;
}
function mount(doc) {
  const dataEl = doc.getElementById("tokinem-data");
  if (!dataEl?.textContent?.trim()) {
    console.error("tokinem: missing #tokinem-data");
    return;
  }
  let artifacts;
  try {
    artifacts = JSON.parse(dataEl.textContent);
  } catch (e) {
    console.error("tokinem: invalid JSON in #tokinem-data", e);
    return;
  }
  const vocab = vocabFromJson(artifacts.vocab);
  const merges = artifacts.merges;
  const input = doc.getElementById("text-input");
  const tokensEl = doc.getElementById("tokens");
  const tokenHero = doc.getElementById("token-hero");
  const charHero = doc.getElementById("char-hero");
  const inspectorEl = doc.getElementById("inspector");
  if (!input || !tokensEl || !inspectorEl) {
    console.error("tokinem: missing DOM nodes");
    return;
  }
  let debounce;
  let selectedIndex = null;
  function pieceText(id) {
    try {
      return new TextDecoder().decode(vocab[id]);
    } catch {
      return "";
    }
  }
  function updateInspectorContent(index, id) {
    inspectorEl.replaceChildren();
    if (index === null || id === null) {
      const p = doc.createElement("p");
      p.className = "hint";
      p.textContent = "Click a token in the preview above.";
      inspectorEl.appendChild(p);
      return;
    }
    const pre = doc.createElement("pre");
    pre.textContent = [
      `id: ${id}`,
      `bytes: ${[...vocab[id]].join(", ")}`,
      `text: ${JSON.stringify(pieceText(id))}`
    ].join(`
`);
    inspectorEl.appendChild(pre);
  }
  function render() {
    const text = input.value;
    const ids = encode(text, merges);
    if (tokenHero)
      tokenHero.textContent = ids.length.toLocaleString();
    if (charHero)
      charHero.textContent = text.length.toLocaleString();
    tokensEl.replaceChildren();
    ids.forEach((id, i) => {
      const span = doc.createElement("span");
      span.className = "token";
      span.dataset.index = String(i);
      span.dataset.id = String(id);
      span.textContent = pieceText(id);
      span.style.background = hueForId(id);
      if (selectedIndex === i)
        span.classList.add("token--selected");
      span.addEventListener("click", () => {
        selectedIndex = i;
        updateInspectorContent(i, id);
        render();
      });
      tokensEl.appendChild(span);
    });
    if (selectedIndex !== null && selectedIndex >= ids.length) {
      selectedIndex = null;
      updateInspectorContent(null, null);
    } else if (selectedIndex !== null && ids[selectedIndex] !== undefined) {
      updateInspectorContent(selectedIndex, ids[selectedIndex]);
    } else {
      updateInspectorContent(null, null);
    }
  }
  function scheduleRender() {
    if (debounce)
      clearTimeout(debounce);
    debounce = setTimeout(() => {
      debounce = undefined;
      render();
    }, 50);
  }
  input.addEventListener("input", scheduleRender);
  scheduleRender();
}
if (typeof document !== "undefined") {
  document.addEventListener("DOMContentLoaded", () => mount(document));
}
