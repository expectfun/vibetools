<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>squatcount</title>
    <style>
      :root {
        --bg-top: #121826;
        --bg-bottom: #1d2742;
        --panel: rgba(16, 22, 36, 0.76);
        --panel-border: rgba(160, 190, 255, 0.16);
        --panel-soft: rgba(8, 12, 22, 0.42);
        --text: #eef2ff;
        --muted: #9ca8c7;
        --accent: #7de2ff;
        --accent-strong: #4db9ff;
        --shadow: 0 24px 80px rgba(6, 10, 20, 0.42);
        --radius-xl: 24px;
        --radius-lg: 18px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top, rgba(125, 226, 255, 0.16), transparent 28%),
          linear-gradient(145deg, var(--bg-top), var(--bg-bottom));
      }

      .page {
        width: min(700px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 40px 0 72px;
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 24px;
        color: var(--muted);
        text-decoration: none;
        font-size: 0.95rem;
        transition: color 140ms ease, transform 140ms ease;
      }

      .back-link:hover,
      .back-link:focus-visible {
        color: var(--accent-strong);
        outline: none;
        transform: translateX(-2px);
      }

      .hero {
        margin-bottom: 32px;
      }

      .hero h1 {
        margin: 0 0 10px;
        font-size: clamp(2.4rem, 6vw, 4rem);
        line-height: 0.93;
        letter-spacing: -0.05em;
        color: var(--text);
      }

      .hero p {
        margin: 0;
        max-width: 52ch;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.65;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: var(--radius-xl);
        box-shadow: var(--shadow);
        backdrop-filter: blur(22px);
        padding: 28px 28px 32px;
      }

      .hero-counter {
        display: flex;
        align-items: baseline;
        gap: 12px;
        margin-bottom: 20px;
      }

      .hero-counter-value {
        font-size: clamp(2.4rem, 5vw, 3.2rem);
        font-weight: 700;
        line-height: 1;
        letter-spacing: -0.03em;
        color: var(--accent);
        font-variant-numeric: tabular-nums;
      }

      .hero-counter-label {
        font-size: 1rem;
        color: var(--muted);
      }

      .stage-meta {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 16px;
        margin-top: 14px;
      }

      .panel-status {
        margin: 0;
        flex: 1;
        min-width: 0;
        font-size: 0.94rem;
        line-height: 1.5;
        color: var(--muted);
        text-align: left;
      }

      .squat-stage {
        position: relative;
        width: 100%;
        min-height: 280px;
        border-radius: var(--radius-lg);
        border: 1px solid rgba(255, 255, 255, 0.08);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01)),
          var(--panel-soft);
        overflow: hidden;
      }

      #cam,
      #overlay {
        display: block;
        width: 100%;
        height: auto;
        vertical-align: middle;
        transform: scaleX(-1);
        transform-origin: center;
      }

      #overlay {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      .live-line {
        margin: 0;
        flex: 1;
        min-width: 0;
        font-size: 0.94rem;
        line-height: 1.5;
        color: var(--muted);
        font-variant-numeric: tabular-nums;
        text-align: right;
      }

      @media (max-width: 600px) {
        .page {
          width: min(100vw - 20px, 700px);
          padding-top: 28px;
          padding-bottom: 48px;
        }

        .panel {
          padding: 20px 18px 24px;
        }

        .squat-stage {
          min-height: 200px;
        }

        .stage-meta {
          flex-direction: column;
          align-items: stretch;
          gap: 8px;
        }

        .live-line {
          text-align: right;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <a class="back-link" href="./index.html">← all tools</a>

      <section class="hero">
        <h1>squatcount</h1>
        <p>Count squats with your webcam.</p>
      </section>

      <div class="panel">
        <div class="hero-counter">
          <span class="hero-counter-value" id="count">0</span>
          <span class="hero-counter-label">squats</span>
        </div>

        <div class="squat-stage">
          <video id="cam" playsinline muted autoplay></video>
          <canvas id="overlay" width="640" height="480"></canvas>
        </div>

        <div class="stage-meta">
          <p class="panel-status" id="status">Loading scripts…</p>
          <p class="live-line" id="angles">—</p>
        </div>
      </div>
    </main>

    <script src="./assets/tfjs/tf.min.js"></script>
    <script>
      globalThis.tfwebgpu = globalThis.tf;
    </script>
    <script src="./assets/tfjs/pose-detection.min.js"></script>
    <script>
      (function () {
        const video = document.getElementById("cam");
        const canvas = document.getElementById("overlay");
        const ctx = canvas.getContext("2d");
        const countEl = document.getElementById("count");
        const statusEl = document.getElementById("status");
        const anglesEl = document.getElementById("angles");

        const MODEL_JSON = new URL("models/movenet-lightning.json", document.baseURI).href;

        const KP = {
          L_HIP: 11,
          R_HIP: 12,
          L_KNEE: 13,
          R_KNEE: 14,
          L_ANKLE: 15,
          R_ANKLE: 16,
        };

        function angleDeg(a, b, c) {
          const ba = { x: a.x - b.x, y: a.y - b.y };
          const bc = { x: c.x - b.x, y: c.y - b.y };
          const dot = ba.x * bc.x + ba.y * bc.y;
          const m = Math.hypot(ba.x, ba.y) * Math.hypot(bc.x, bc.y);
          if (m < 1e-6) return NaN;
          return (Math.acos(Math.min(1, Math.max(-1, dot / m))) * 180) / Math.PI;
        }

        function avgKneeAngle(keypoints) {
          const minScore = 0.25;
          const pick = (i) => keypoints[i];
          const lH = pick(KP.L_HIP);
          const lK = pick(KP.L_KNEE);
          const lA = pick(KP.L_ANKLE);
          const rH = pick(KP.R_HIP);
          const rK = pick(KP.R_KNEE);
          const rA = pick(KP.R_ANKLE);
          const leftOk = lH.score >= minScore && lK.score >= minScore && lA.score >= minScore;
          const rightOk = rH.score >= minScore && rK.score >= minScore && rA.score >= minScore;
          const left = leftOk ? angleDeg(lH, lK, lA) : NaN;
          const right = rightOk ? angleDeg(rH, rK, rA) : NaN;
          if (!leftOk && !rightOk) return NaN;
          if (!leftOk) return right;
          if (!rightOk) return left;
          return (left + right) / 2;
        }

        function drawSkeleton(keypoints) {
          const w = canvas.width;
          const h = canvas.height;
          ctx.clearRect(0, 0, w, h);
          ctx.strokeStyle = "rgba(125, 226, 255, 0.88)";
          ctx.lineWidth = 3;
          const pairs = [
            [KP.L_HIP, KP.L_KNEE],
            [KP.L_KNEE, KP.L_ANKLE],
            [KP.R_HIP, KP.R_KNEE],
            [KP.R_KNEE, KP.R_ANKLE],
            [KP.L_HIP, KP.R_HIP],
          ];
          for (const [i, j] of pairs) {
            const a = keypoints[i];
            const b = keypoints[j];
            if (a.score < 0.2 || b.score < 0.2) continue;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.stroke();
          }
        }

        async function setupCamera() {
          if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            throw new Error("Camera API unavailable (use https:// or http://localhost and a modern browser).");
          }
          const stream = await navigator.mediaDevices.getUserMedia({
            audio: false,
            video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } },
          });
          video.srcObject = stream;
          await video.play();
          const vw = video.videoWidth;
          const vh = video.videoHeight;
          canvas.width = vw;
          canvas.height = vh;
        }

        function syncCanvasToVideo() {
          if (video.videoWidth && video.videoHeight) {
            if (canvas.width !== video.videoWidth || canvas.height !== video.videoHeight) {
              canvas.width = video.videoWidth;
              canvas.height = video.videoHeight;
            }
          }
        }

        async function main() {
          if (typeof tf === "undefined" || typeof poseDetection === "undefined") {
            throw new Error("TensorFlow or pose-detection failed to load (check network / ad blocker).");
          }

          statusEl.textContent = "Allow camera when prompted…";
          try {
            await setupCamera();
          } catch (e) {
            statusEl.textContent =
              "Camera: " + (e && e.message ? e.message : String(e)) + " — check site permissions.";
            throw e;
          }

          statusEl.textContent = "Loading MoveNet (local weights)…";
          await tf.ready();
          statusEl.textContent = "Warming up (" + tf.getBackend() + ")…";

          const detector = await poseDetection.createDetector(poseDetection.SupportedModels.MoveNet, {
            modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING,
            modelUrl: MODEL_JSON,
          });

          statusEl.textContent = "Ready — " + tf.getBackend();
          syncCanvasToVideo();

          let reps = 0;
          let phase = "up";
          let smoothed = 180;
          const smooth = 0.35;
          const downEnter = 115;
          const upConfirm = 145;

          async function frame() {
            syncCanvasToVideo();
            if (!video.videoWidth) {
              requestAnimationFrame(frame);
              return;
            }

            const poses = await detector.estimatePoses(video, {
              flipHorizontal: false,
              maxPoses: 1,
            });

            if (!poses.length) {
              anglesEl.textContent = "No pose — stay in frame";
              requestAnimationFrame(frame);
              return;
            }

            const kp = poses[0].keypoints;
            const raw = avgKneeAngle(kp);
            if (Number.isNaN(raw)) {
              anglesEl.textContent = "Legs not visible enough";
              requestAnimationFrame(frame);
              return;
            }

            smoothed = smoothed * (1 - smooth) + raw * smooth;

            if (phase === "up" && smoothed < downEnter) phase = "down";
            else if (phase === "down" && smoothed > upConfirm) {
              reps += 1;
              phase = "up";
              countEl.textContent = reps.toLocaleString();
            }

            drawSkeleton(kp);
            anglesEl.textContent = "Knee angle ≈ " + smoothed.toFixed(0) + "° · phase: " + phase;
            requestAnimationFrame(frame);
          }

          requestAnimationFrame(frame);
        }

        main().catch(function (err) {
          console.error(err);
          statusEl.textContent =
            (err && err.message ? err.message : String(err)) +
            " — open via http://127.0.0.1:PORT/ (not file://).";
        });
      })();
    </script>
  </body>
</html>
