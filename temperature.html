<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>temperature</title>
  <style>
    :root {
      --bg-start: #121826;
      --bg-end: #1d2742;
      --panel: rgba(16, 22, 36, 0.76);
      --panel-border: rgba(160, 190, 255, 0.16);
      --panel-soft: rgba(8, 12, 22, 0.42);
      --text: #eef2ff;
      --muted: #9ca8c7;
      --muted-strong: #c6d0ea;
      --accent: #7de2ff;
      --accent-strong: #4db9ff;
      --accent-soft: rgba(125, 226, 255, 0.14);
      --shadow: 0 24px 80px rgba(6, 10, 20, 0.42);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --celsius: #ef4444;
      --fahrenheit: #3b82f6;
      --kelvin: #10b981;
      --rankine: #f59e0b;
      --meet: #fbbf24;
    }

    * { box-sizing: border-box; }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 22px;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.95rem;
      line-height: 1.2;
      transition: color 140ms ease, transform 140ms ease;
    }

    .back-link:hover,
    .back-link:focus-visible {
      color: var(--accent);
      outline: none;
      transform: translateX(-2px);
    }

    body {
      margin: 0;
      min-height: 100dvh;
      font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(125, 226, 255, 0.16), transparent 28%),
        linear-gradient(145deg, var(--bg-start), var(--bg-end));
    }

    .page {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 40px 0 64px;
    }

    /* ── Hero ── */
    .hero { margin-bottom: 28px; }
    .hero h1 {
      margin: 0 0 10px;
      font-size: clamp(2.2rem, 5vw, 3.6rem);
      line-height: 0.95;
      letter-spacing: -0.04em;
    }
    .hero p {
      margin: 0;
      max-width: 56ch;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
    }

    /* ── Workspace ── */
    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) minmax(300px, 0.9fr);
      gap: 24px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px);
    }

    /* ── Graph Panel ── */
    .graph-panel {
      padding: 0;
      display: flex;
      flex-direction: column;
    }

    .panel-kicker {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }
    .panel-kicker strong {
      font-size: 0.92rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted-strong);
    }
    .panel-kicker span {
      color: var(--muted);
      font-size: 0.82rem;
    }

    .graph-wrapper {
      flex: 1;
      border-radius: var(--radius-xl);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    canvas { width: 100%; height: 100%; display: block; }

    /* ── Controls Panel ── */
    .controls-panel {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    .controls-header h2 { margin: 0 0 6px; font-size: 1.15rem; }
    .controls-header p { margin: 0; color: var(--muted); font-size: 0.9rem; line-height: 1.5; }

    .control-stack { display: grid; gap: 18px; }

    .scale-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      align-items: center;
    }

    .scale-header {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--muted-strong);
    }

    .scale-label {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .scale-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    .icon-c { background: rgba(239, 68, 68, 0.15); color: var(--celsius); }
    .icon-f { background: rgba(59, 130, 246, 0.15); color: var(--fahrenheit); }
    .icon-k { background: rgba(16, 185, 129, 0.15); color: var(--kelvin); }
    .icon-r { background: rgba(245, 158, 11, 0.15); color: var(--rankine); }

    .input-field {
      -webkit-appearance: none;
      -moz-appearance: textfield;
      appearance: none;
      width: 100%;
      background: rgba(7, 11, 20, 0.72);
      border: 1px solid rgba(160, 190, 255, 0.18);
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--text);
      font-family: 'Courier New', monospace;
      font-size: 1.4rem;
      font-weight: 600;
      text-align: right;
      outline: none;
      transition: border-color 140ms ease, box-shadow 140ms ease;
    }

    .input-field::-webkit-inner-spin-button,
    .input-field::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .input-field[type="number"] {
      -moz-appearance: textfield;
    }

    .input-field:focus {
      border-color: rgba(125, 226, 255, 0.42);
      box-shadow: 0 0 0 3px rgba(125, 226, 255, 0.08);
    }
    .input-c:focus { border-color: rgba(239, 68, 68, 0.5); box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.08); }
    .input-f:focus { border-color: rgba(59, 130, 246, 0.5); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.08); }
    .input-k:focus { border-color: rgba(16, 185, 129, 0.5); box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.08); }
    .input-r:focus { border-color: rgba(245, 158, 11, 0.5); box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.08); }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      outline: none;
      cursor: pointer;
      background: rgba(160, 190, 255, 0.1);
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      cursor: pointer;
      border: 2.5px solid #fff;
      transition: transform 140ms ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.15); }

    .master-slider input[type="range"]::-webkit-slider-thumb { background: var(--accent); }

    .divider { height: 1px; background: var(--panel-border); }

    .fact-bar {
      background: var(--accent-soft);
      border: 1px solid rgba(125, 226, 255, 0.2);
      border-radius: var(--radius-md);
      padding: 12px 16px;
      font-size: 0.85rem;
      color: var(--muted-strong);
      line-height: 1.5;
      transition: opacity 0.3s;
    }

    .ref-section h3 {
      font-size: 0.8rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .ref-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6px;
    }

    .ref-btn {
      background: rgba(7, 11, 20, 0.72);
      border: 1px solid rgba(160, 190, 255, 0.18);
      border-radius: 10px;
      padding: 14px 14px;
      cursor: pointer;
      transition: border-color 140ms ease, background 140ms ease, box-shadow 140ms ease;
      text-align: left;
    }

    .ref-btn:hover {
      border-color: rgba(125, 226, 255, 0.4);
      background: rgba(125, 226, 255, 0.08);
      box-shadow: 0 0 0 3px rgba(125, 226, 255, 0.05);
    }

    .ref-btn .ref-name { font-size: 0.85rem; color: var(--muted); margin-bottom: 4px; }
    .ref-btn .ref-val { font-size: 1rem; font-weight: 600; color: var(--accent); }

    @media (max-width: 920px) {
      .workspace { grid-template-columns: 1fr; }
    }

    @media (max-width: 640px) {
      .page { width: min(100vw - 20px, 1180px); padding-top: 28px; }
      .graph-panel, .controls-panel { padding: 18px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <a class="back-link" href="./index.html">← all tools</a>

    <section class="hero">
      <h1>temperature</h1>
      <p>Explore how scales relate</p>
    </section>

    <section class="workspace">
      <!-- Left: Graph -->
      <div class="panel graph-panel">
        <div class="graph-wrapper">
          <canvas id="graph" width="1300" height="1200"></canvas>
        </div>
      </div>

      <!-- Right: Controls -->
      <aside class="panel controls-panel">
        <div class="controls-header">
          <p>Drag the slider or type a value to set the temperature.</p>
        </div>

        <div class="control-stack">
          <!-- Master Slider -->
          <div class="master-slider">
            <input type="range" id="masterSlider" min="-273.15" max="350" step="0.1" value="20">
          </div>

          <!-- Scale Readouts -->
          <div class="scale-group">
            <div class="scale-header">
              <span class="scale-icon icon-c">°C</span>
              Celsius
            </div>
            <input type="number" class="input-field input-c" id="inputC" value="20" step="0.1">
          </div>

          <div class="scale-group">
            <div class="scale-header">
              <span class="scale-icon icon-f">°F</span>
              Fahrenheit
            </div>
            <input type="number" class="input-field input-f" id="inputF" value="68" step="0.1">
          </div>

          <div class="scale-group">
            <div class="scale-header">
              <span class="scale-icon icon-k">K</span>
              Kelvin
            </div>
            <input type="number" class="input-field input-k" id="inputK" value="293.15" step="0.1">
          </div>

          <div class="scale-group">
            <div class="scale-header">
              <span class="scale-icon icon-r">°R</span>
              Rankine
            </div>
            <input type="number" class="input-field input-r" id="inputR" value="527.67" step="0.1">
          </div>
        </div>

        <div class="divider"></div>

        <!-- Reference Points -->
        <div class="ref-section">
          <h3>Quick Reference</h3>
          <div class="ref-grid" id="refGrid"></div>
        </div>
      </aside>
    </section>
  </main>

  <script>
    // ── Elements ──
    const masterSlider = document.getElementById('masterSlider');
    const inputC = document.getElementById('inputC');
    const inputF = document.getElementById('inputF');
    const inputK = document.getElementById('inputK');
    const inputR = document.getElementById('inputR');
    const canvas = document.getElementById('graph');
    const ctx = canvas.getContext('2d');

    // ── Conversions ──
    function cToF(c) { return c * 9 / 5 + 32; }
    function fToC(f) { return (f - 32) * 5 / 9; }
    function cToK(c) { return c + 273.15; }
    function kToC(k) { return k - 273.15; }
    function cToR(c) { return (c + 273.15) * 9 / 5; }
    function rToC(r) { return r * 5 / 9 - 273.15; }

    // ── Update ──
    function setCelsius(c) {
      // Clamp to absolute zero
      if (c < -273.15) c = -273.15;

      masterSlider.value = c;

      inputC.value = parseFloat(c.toFixed(2));
      inputF.value = parseFloat(cToF(c).toFixed(2));
      inputK.value = parseFloat(cToK(c).toFixed(2));
      inputR.value = parseFloat(cToR(c).toFixed(2));

      drawGraph(c);
    }

    masterSlider.addEventListener('input', () => setCelsius(parseFloat(masterSlider.value)));
    inputC.addEventListener('change', () => setCelsius(parseFloat(inputC.value) || 0));
    inputF.addEventListener('change', () => setCelsius(fToC(parseFloat(inputF.value) || 0)));
    inputK.addEventListener('change', () => setCelsius(kToC(parseFloat(inputK.value) || 0)));
    inputR.addEventListener('change', () => setCelsius(rToC(parseFloat(inputR.value) || 0)));

    // ── Reference Points ──
    const refs = [
      { name: 'Absolute Zero', c: -273.15 },
      { name: 'Dry Ice', c: -78.5 },
      { name: 'C/F Meet', c: -40 },
      { name: 'Water Freezes', c: 0 },
      { name: 'Room Temp', c: 20 },
      { name: 'Body Temp', c: 37 },
      { name: 'Water Boils', c: 100 },
      { name: 'Oven', c: 180 },
    ];

    function renderRefs() {
      const grid = document.getElementById('refGrid');
      grid.innerHTML = '';
      refs.forEach(r => {
        const btn = document.createElement('div');
        btn.className = 'ref-btn';
        btn.innerHTML = `<div class="ref-name">${r.name}</div><div class="ref-val">${r.c}°C</div>`;
        btn.onclick = () => setCelsius(r.c);
        grid.appendChild(btn);
      });
    }

    // ── Graph ──
    function drawGraph(currentC) {
      const W = canvas.width;
      const H = canvas.height;
      ctx.clearRect(0, 0, W, H);

      const pad = { top: 50, right: 70, bottom: 70, left: 70 };
      const gW = W - pad.left - pad.right;
      const gH = H - pad.top - pad.bottom;

      // X-axis: absolute zero to max slider + padding
      const minC = -273.15, maxC = 350;
      // Y-axis: at 350°C → F=662, K=623, R=1122; at absolute zero → F=-460, K=0, R=0
      const minVal = -500, maxVal = 1200;

      function cToX(c) { return pad.left + ((c - minC) / (maxC - minC)) * gW; }
      function valToY(val) { return pad.top + gH - ((val - minVal) / (maxVal - minVal)) * gH; }

      // Background
      ctx.fillStyle = '#090d18';
      ctx.fillRect(0, 0, W, H);

      const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
      bgGrad.addColorStop(0, 'rgba(125, 226, 255, 0.03)');
      bgGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
      ctx.fillStyle = bgGrad;
      ctx.fillRect(0, 0, W, H);

      // Grid
      ctx.strokeStyle = 'rgba(160, 190, 255, 0.06)';
      ctx.lineWidth = 1;
      for (let c = -200; c <= 500; c += 100) {
        const x = cToX(c);
        ctx.beginPath(); ctx.moveTo(x, pad.top); ctx.lineTo(x, pad.top + gH); ctx.stroke();
      }
      for (let v = minVal; v <= maxVal; v += 200) {
        const y = valToY(v);
        ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + gW, y); ctx.stroke();
        ctx.fillStyle = 'rgba(156, 168, 199, 0.4)';
        ctx.font = '20px -apple-system, sans-serif';
        ctx.textAlign = 'right';
        ctx.fillText(v, pad.left - 12, y + 6);
      }

      // Zero line
      const zeroY = valToY(0);
      ctx.strokeStyle = 'rgba(160, 190, 255, 0.15)';
      ctx.lineWidth = 1;
      ctx.setLineDash([6, 6]);
      ctx.beginPath(); ctx.moveTo(pad.left, zeroY); ctx.lineTo(pad.left + gW, zeroY); ctx.stroke();
      ctx.setLineDash([]);

      // Key vertical reference lines
      const keyPoints = [
        { c: -273.15, label: 'Absolute Zero' },
        { c: 0, label: 'Water freezes' },
        { c: 100, label: 'Water boils' },
      ];

      ctx.setLineDash([4, 4]);
      ctx.strokeStyle = 'rgba(160, 190, 255, 0.12)';
      ctx.lineWidth = 1;
      keyPoints.forEach(p => {
        const x = cToX(p.c);
        ctx.beginPath(); ctx.moveTo(x, pad.top); ctx.lineTo(x, pad.top + gH); ctx.stroke();
        ctx.fillStyle = 'rgba(156, 168, 199, 0.5)';
        ctx.font = '20px -apple-system, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(p.label, x, pad.top + gH + 22);
      });
      ctx.setLineDash([]);

      // Scale lines
      function drawScaleLine(color, label, valueFn) {
        ctx.save();
        ctx.shadowColor = color;
        ctx.shadowBlur = 8;
        ctx.strokeStyle = color;
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        let started = false;
        for (let c = minC; c <= maxC; c += 1) {
          const x = cToX(c);
          const y = valToY(valueFn(c));
          if (y < pad.top || y > pad.top + gH) { started = false; continue; }
          if (!started) { ctx.moveTo(x, y); started = true; }
          else ctx.lineTo(x, y);
        }
        ctx.stroke();
        ctx.restore();

        // Label at right edge
        const labelC = maxC - 10;
        const labelY = valToY(valueFn(labelC));
        if (labelY >= pad.top && labelY <= pad.top + gH) {
          ctx.fillStyle = color;
          ctx.font = 'bold 20px -apple-system, sans-serif';
          ctx.textAlign = 'left';
          ctx.fillText(label, cToX(labelC) + 12, labelY + 5);
        }
      }

      drawScaleLine('#ef4444', '°C', c => c);
      drawScaleLine('#3b82f6', '°F', c => cToF(c));
      drawScaleLine('#10b981', 'K', c => cToK(c));
      drawScaleLine('#f59e0b', '°R', c => cToR(c));

      // Intersection: C = F at -40
      const meetX = cToX(-40);
      const meetY = valToY(-40);
      ctx.save();
      ctx.shadowColor = '#fbbf24';
      ctx.shadowBlur = 12;
      ctx.beginPath();
      ctx.arc(meetX, meetY, 7, 0, Math.PI * 2);
      ctx.fillStyle = '#fbbf24';
      ctx.fill();
      ctx.restore();
      ctx.strokeStyle = '#fbbf24';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.fillStyle = '#fbbf24';
      ctx.font = 'bold 20px -apple-system, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('−40° on both scales', meetX, meetY - 20);

      // Intersection: K = °R at absolute zero (both = 0)
      const azX = cToX(-273.15);
      const azY = valToY(0);
      ctx.save();
      ctx.shadowColor = '#a78bfa';
      ctx.shadowBlur = 12;
      ctx.beginPath();
      ctx.arc(azX, azY, 7, 0, Math.PI * 2);
      ctx.fillStyle = '#a78bfa';
      ctx.fill();
      ctx.restore();
      ctx.strokeStyle = '#a78bfa';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.fillStyle = '#a78bfa';
      ctx.font = 'bold 20px -apple-system, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('K = °R = 0', azX + 50, azY - 20);

      // Current temp markers
      const clampC = Math.max(minC, Math.min(maxC, currentC));
      const curX = cToX(clampC);

      function drawMarker(val, color) {
        const y = valToY(val);
        if (y < pad.top - 5 || y > pad.top + gH + 5) return;
        ctx.save();
        ctx.shadowColor = color;
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.arc(curX, y, 8, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
        ctx.restore();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      drawMarker(currentC, '#ef4444');
      drawMarker(cToF(currentC), '#3b82f6');
      drawMarker(cToK(currentC), '#10b981');
      drawMarker(cToR(currentC), '#f59e0b');

      // Vertical line at current temp
      ctx.strokeStyle = 'rgba(125, 226, 255, 0.25)';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([6, 4]);
      ctx.beginPath(); ctx.moveTo(curX, pad.top); ctx.lineTo(curX, pad.top + gH); ctx.stroke();
      ctx.setLineDash([]);

      // Current temp label
      if (clampC === currentC) {
        ctx.fillStyle = 'rgba(125, 226, 255, 0.9)';
        ctx.font = 'bold 20px -apple-system, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(`${parseFloat(currentC.toFixed(1))}°C`, curX, pad.top - 14);
      }

      // Axis labels
      ctx.fillStyle = 'rgba(156, 168, 199, 0.5)';
      ctx.font = '20px -apple-system, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Temperature (°C) →', W / 2, H - 16);
      ctx.save();
      ctx.translate(20, H / 2);
      ctx.rotate(-Math.PI / 2);
      ctx.fillText('Scale value →', 0, 0);
      ctx.restore();

    }

    // ── Boot ──
    renderRefs();
    setCelsius(20);
  </script>
</body>
</html>
