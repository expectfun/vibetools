<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>charcount</title>
    <style>
      :root {
        --bg-top: #121826;
        --bg-bottom: #1d2742;
        --panel: rgba(16, 22, 36, 0.76);
        --panel-border: rgba(160, 190, 255, 0.16);
        --panel-soft: rgba(8, 12, 22, 0.42);
        --text: #eef2ff;
        --muted: #9ca8c7;
        --muted-strong: #c6d0ea;
        --accent: #7de2ff;
        --accent-strong: #4db9ff;
        --accent-soft: rgba(125, 226, 255, 0.14);
        --danger: #ff8c8c;
        --shadow: 0 24px 80px rgba(6, 10, 20, 0.42);
        --radius-xl: 24px;
        --radius-lg: 18px;
        --radius-md: 14px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top, rgba(125, 226, 255, 0.16), transparent 28%),
          linear-gradient(145deg, var(--bg-top), var(--bg-bottom));
      }

      .page {
        width: min(1180px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 40px 0 64px;
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 22px;
        color: var(--muted);
        text-decoration: none;
        font-size: 0.95rem;
        line-height: 1.2;
        transition: color 140ms ease, transform 140ms ease;
      }

      .back-link:hover,
      .back-link:focus-visible {
        color: var(--accent-strong);
        outline: none;
        transform: translateX(-2px);
      }

      .hero {
        margin-bottom: 28px;
      }

      .hero h1 {
        margin: 0 0 10px;
        font-size: clamp(2.2rem, 5vw, 3.6rem);
        line-height: 0.95;
        letter-spacing: -0.04em;
      }

      .hero p {
        margin: 0;
        max-width: 56ch;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.6;
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(0, 1.4fr) minmax(300px, 0.9fr);
        gap: 24px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: var(--radius-xl);
        box-shadow: var(--shadow);
        backdrop-filter: blur(22px);
      }

      .editor-panel {
        padding: 24px;
      }

      .panel-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
      }

      .panel-header h2,
      .stats-header h2 {
        margin: 0;
        font-size: 1.1rem;
      }

      .section-kicker {
        display: block;
        font-size: 0.92rem;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--muted-strong);
      }

      .panel-header p,
      .stats-header p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
        font-size: 0.92rem;
      }

      .button-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      button {
        appearance: none;
        border: 0;
        border-radius: 999px;
        padding: 11px 16px;
        font: inherit;
        font-size: 0.94rem;
        cursor: pointer;
        transition:
          transform 140ms ease,
          background 140ms ease,
          color 140ms ease,
          border-color 140ms ease;
      }

      button:hover,
      button:focus-visible {
        transform: translateY(-1px);
        outline: none;
      }

      .primary-button {
        background: linear-gradient(135deg, var(--accent), var(--accent-strong));
        color: #08121f;
        font-weight: 700;
      }

      .secondary-button {
        background: rgba(255, 255, 255, 0.04);
        color: var(--muted-strong);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .editor-shell {
        position: relative;
      }

      textarea {
        width: 100%;
        min-height: 540px;
        resize: vertical;
        padding: 26px 24px 84px;
        border-radius: var(--radius-lg);
        border: 1px solid rgba(255, 255, 255, 0.08);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01)),
          var(--panel-soft);
        color: var(--text);
        font: inherit;
        font-size: 1rem;
        line-height: 1.65;
      }

      textarea::placeholder {
        color: rgba(198, 208, 234, 0.6);
      }

      textarea:focus-visible {
        outline: 1px solid rgba(125, 226, 255, 0.45);
        border-color: rgba(125, 226, 255, 0.35);
      }

      .editor-footer {
        position: absolute;
        left: 18px;
        right: 18px;
        bottom: 18px;
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        gap: 10px;
        color: var(--muted);
        font-size: 0.88rem;
      }

      .stats-panel {
        padding: 24px;
        display: grid;
        gap: 18px;
        align-content: start;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .stat-card {
        padding: 16px;
        border-radius: var(--radius-lg);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.015)),
          rgba(255, 255, 255, 0.015);
        border: 1px solid rgba(255, 255, 255, 0.06);
      }

      .stat-label {
        margin: 0 0 10px;
        color: var(--muted);
        font-size: 0.82rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .stat-value {
        margin: 0;
        font-size: clamp(1.6rem, 3vw, 2.2rem);
        line-height: 1;
      }

      @media (max-width: 940px) {
        .workspace {
          grid-template-columns: 1fr;
        }

        textarea {
          min-height: 400px;
        }
      }

      @media (max-width: 640px) {
        .page {
          width: min(100vw - 20px, 1180px);
          padding-top: 28px;
        }

        .editor-panel,
        .stats-panel {
          padding: 18px;
        }

        .panel-header {
          flex-direction: column;
        }

        .stats-grid {
          grid-template-columns: 1fr;
        }

        textarea {
          padding: 20px 18px 94px;
          font-size: 1.02rem;
        }

        .editor-footer {
          left: 14px;
          right: 14px;
          bottom: 14px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <a class="back-link" href="./index.html">← all tools</a>

      <section class="hero">
        <h1>charcount</h1>
        <p>Count characters and words.</p>
      </section>

      <section class="workspace">
        <div class="panel editor-panel">
          <div class="panel-header">
            <div>
              <strong class="section-kicker">Text</strong>
            </div>

            <div class="button-row">
              <button class="secondary-button" id="copyButton" type="button">Copy</button>
              <button class="secondary-button" id="pasteButton" type="button">Paste</button>
              <button class="secondary-button" id="clearButton" type="button">Clear</button>
            </div>
          </div>

          <div class="editor-shell">
            <textarea
              id="textInput"
              spellcheck="false"
              placeholder="Start typing. Every character lands here like a boot on wet concrete."
            ></textarea>

            <div class="editor-footer">
              <span id="selectionSummary">No selection</span>
              <span id="statusMessage">Ready</span>
            </div>
          </div>
        </div>

        <aside class="panel stats-panel">
          <div class="stats-header">
            <h2>Stats</h2>
          </div>

          <div class="stats-grid">
            <article class="stat-card">
              <p class="stat-label">Characters</p>
              <p class="stat-value" id="charactersValue">0</p>
            </article>

            <article class="stat-card">
              <p class="stat-label">Without spaces</p>
              <p class="stat-value" id="charactersNoSpacesValue">0</p>
            </article>

            <article class="stat-card">
              <p class="stat-label">Words</p>
              <p class="stat-value" id="wordsValue">0</p>
            </article>

            <article class="stat-card">
              <p class="stat-label">Lines</p>
              <p class="stat-value" id="linesValue">0</p>
            </article>

          </div>
        </aside>
      </section>
    </main>

    <script>
      const textInput = document.getElementById("textInput");
      const pasteButton = document.getElementById("pasteButton");
      const clearButton = document.getElementById("clearButton");
      const copyButton = document.getElementById("copyButton");
      const statusMessage = document.getElementById("statusMessage");
      const selectionSummary = document.getElementById("selectionSummary");

      const charactersValue = document.getElementById("charactersValue");
      const charactersNoSpacesValue = document.getElementById("charactersNoSpacesValue");
      const wordsValue = document.getElementById("wordsValue");
      const linesValue = document.getElementById("linesValue");

      function countWords(text) {
        const matches = text.trim().match(/\S+/g);
        return matches ? matches.length : 0;
      }

      function countLines(text) {
        return text.length === 0 ? 0 : text.split(/\r\n|\r|\n/).length;
      }

      function countCharactersWithoutSpaces(text) {
        return text.replace(/\s/g, "").length;
      }

      function updateSelectionSummary() {
        const selectionLength = Math.abs(textInput.selectionEnd - textInput.selectionStart);
        selectionSummary.textContent = selectionLength > 0 ? selectionLength + " selected" : "No selection";
      }

      function updateStats() {
        const text = textInput.value;
        const characters = text.length;
        const words = countWords(text);
        const lines = countLines(text);
        const charactersNoSpaces = countCharactersWithoutSpaces(text);

        charactersValue.textContent = characters.toLocaleString();
        charactersNoSpacesValue.textContent = charactersNoSpaces.toLocaleString();
        wordsValue.textContent = words.toLocaleString();
        linesValue.textContent = lines.toLocaleString();
        statusMessage.textContent = characters === 0 ? "Ready" : "Live count";
        updateSelectionSummary();
      }

      async function copyText() {
        if (!textInput.value) {
          statusMessage.textContent = "Nothing to copy";
          return;
        }

        try {
          await navigator.clipboard.writeText(textInput.value);
          statusMessage.textContent = "Copied";
        } catch (error) {
          statusMessage.textContent = "Clipboard blocked";
        }
      }

      pasteButton.addEventListener("click", async () => {
        try {
          const clipboardText = await navigator.clipboard.readText();
          textInput.value = clipboardText;
          updateStats();
          textInput.focus();
          textInput.setSelectionRange(textInput.value.length, textInput.value.length);
          statusMessage.textContent = clipboardText ? "Pasted" : "Clipboard empty";
        } catch (error) {
          statusMessage.textContent = "Clipboard blocked";
        }
      });

      clearButton.addEventListener("click", () => {
        textInput.value = "";
        updateStats();
        textInput.focus();
      });

      copyButton.addEventListener("click", () => {
        copyText();
      });

      textInput.addEventListener("input", updateStats);
      textInput.addEventListener("click", updateSelectionSummary);
      textInput.addEventListener("keyup", updateSelectionSummary);
      textInput.addEventListener("select", updateSelectionSummary);

      updateStats();
    </script>
  </body>
</html>
