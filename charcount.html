<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>charcount</title>
    <style>
      :root {
        --bg-top: #121826;
        --bg-bottom: #1d2742;
        --panel: rgba(16, 22, 36, 0.76);
        --panel-border: rgba(160, 190, 255, 0.16);
        --panel-soft: rgba(8, 12, 22, 0.42);
        --text: #eef2ff;
        --muted: #9ca8c7;
        --muted-strong: #c6d0ea;
        --accent: #7de2ff;
        --accent-strong: #4db9ff;
        --accent-soft: rgba(125, 226, 255, 0.14);
        --shadow: 0 24px 80px rgba(6, 10, 20, 0.42);
        --radius-xl: 24px;
        --radius-lg: 18px;
        --radius-md: 14px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top, rgba(125, 226, 255, 0.16), transparent 28%),
          linear-gradient(145deg, var(--bg-top), var(--bg-bottom));
      }

      .page {
        width: min(700px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 40px 0 72px;
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 24px;
        color: var(--muted);
        text-decoration: none;
        font-size: 0.95rem;
        transition: color 140ms ease, transform 140ms ease;
      }

      .back-link:hover,
      .back-link:focus-visible {
        color: var(--accent-strong);
        outline: none;
        transform: translateX(-2px);
      }

      .hero {
        margin-bottom: 32px;
      }

      .hero h1 {
        margin: 0 0 10px;
        font-size: clamp(2.4rem, 6vw, 4rem);
        line-height: 0.93;
        letter-spacing: -0.05em;
      }

      .hero p {
        margin: 0;
        max-width: 52ch;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.65;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: var(--radius-xl);
        box-shadow: var(--shadow);
        backdrop-filter: blur(22px);
        padding: 28px 28px 32px;
      }

      /* ---- Hero counter ---- */

      .hero-counter {
        display: flex;
        align-items: baseline;
        gap: 12px;
        margin-bottom: 20px;
      }

      .hero-counter-value {
        font-size: clamp(2.4rem, 5vw, 3.2rem);
        font-weight: 700;
        line-height: 1;
        letter-spacing: -0.03em;
        color: var(--accent);
        font-variant-numeric: tabular-nums;
      }

      .hero-counter-label {
        font-size: 1rem;
        color: var(--muted);
      }

      /* ---- Textarea ---- */

      textarea {
        width: 100%;
        min-height: 360px;
        resize: vertical;
        padding: 22px 20px;
        border-radius: var(--radius-lg);
        border: 1px solid rgba(255, 255, 255, 0.08);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01)),
          var(--panel-soft);
        color: var(--text);
        font: inherit;
        font-size: 1rem;
        line-height: 1.65;
      }

      textarea::placeholder {
        color: rgba(198, 208, 234, 0.6);
      }

      textarea:focus-visible {
        outline: 1px solid rgba(125, 226, 255, 0.45);
        border-color: rgba(125, 226, 255, 0.35);
      }

      /* ---- Buttons ---- */

      .button-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 16px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 11px 24px;
        border: none;
        border-radius: 999px;
        font-family: inherit;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 140ms ease, transform 120ms ease, border-color 140ms ease;
      }

      .btn:active {
        transform: scale(0.97);
      }

      .btn-secondary {
        background: transparent;
        color: var(--muted-strong);
        border: 1px solid var(--panel-border);
      }

      .btn-secondary:hover {
        border-color: rgba(125, 226, 255, 0.32);
        color: var(--text);
      }

      /* ---- Stats ---- */

      .stats-section {
        margin-top: 24px;
      }

      .stats-heading {
        margin: 0 0 14px;
        font-size: 0.82rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted-strong);
      }

      .stats-list {
        display: grid;
        gap: 0;
      }

      .stat-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        padding: 10px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }

      .stat-row:last-child {
        border-bottom: none;
      }

      .stat-label {
        color: var(--muted);
        font-size: 0.94rem;
      }

      .stat-value {
        font-size: 1.1rem;
        font-weight: 600;
        font-variant-numeric: tabular-nums;
        color: var(--text);
      }

      .stat-value.empty {
        color: var(--muted);
      }

      .hidden {
        display: none !important;
      }

      /* ---- Responsive ---- */

      @media (max-width: 600px) {
        .page {
          width: min(100vw - 20px, 700px);
          padding-top: 28px;
          padding-bottom: 48px;
        }

        .panel {
          padding: 20px 18px 24px;
        }

        textarea {
          min-height: 240px;
          font-size: 1.02rem;
        }

        .button-row {
          flex-direction: column;
        }

        .button-row .btn {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <a class="back-link" href="./index.html">← all tools</a>

      <section class="hero">
        <h1>charcount</h1>
        <p>Count characters and words.</p>
      </section>

      <div class="panel">
        <div class="hero-counter">
          <span class="hero-counter-value" id="charactersValue">0</span>
          <span class="hero-counter-label">characters</span>
        </div>

        <textarea
          id="textInput"
          spellcheck="false"
          placeholder="Start typing or paste text here."
        ></textarea>

        <div class="button-row">
          <button class="btn btn-secondary" id="pasteButton" type="button">Paste</button>
          <button class="btn btn-secondary" id="clearButton" type="button">Clear</button>
          <button class="btn btn-secondary" id="detailsButton" type="button">Details</button>
        </div>

        <div class="stats-section hidden" id="statsSection">
          <div class="stats-list">
            <div class="stat-row">
              <span class="stat-label">Without spaces</span>
              <span class="stat-value" id="charactersNoSpacesValue">0</span>
            </div>
            <div class="stat-row">
              <span class="stat-label">Words</span>
              <span class="stat-value" id="wordsValue">0</span>
            </div>
            <div class="stat-row">
              <span class="stat-label">Lines</span>
              <span class="stat-value" id="linesValue">0</span>
            </div>
            <div class="stat-row">
              <span class="stat-label">Selected</span>
              <span class="stat-value empty" id="selectedValue">—</span>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script>
      const textInput = document.getElementById("textInput");
      const pasteButton = document.getElementById("pasteButton");
      const clearButton = document.getElementById("clearButton");
      const detailsButton = document.getElementById("detailsButton");
      const statsSection = document.getElementById("statsSection");

      const charactersValue = document.getElementById("charactersValue");
      const charactersNoSpacesValue = document.getElementById("charactersNoSpacesValue");
      const wordsValue = document.getElementById("wordsValue");
      const linesValue = document.getElementById("linesValue");
      const selectedValue = document.getElementById("selectedValue");

      function countWords(text) {
        const matches = text.trim().match(/\S+/g);
        return matches ? matches.length : 0;
      }

      function countLines(text) {
        return text.length === 0 ? 0 : text.split(/\r\n|\r|\n/).length;
      }

      function countCharactersWithoutSpaces(text) {
        return text.replace(/\s/g, "").length;
      }

      function updateSelection() {
        const len = Math.abs(textInput.selectionEnd - textInput.selectionStart);
        if (len > 0) {
          selectedValue.textContent = len.toLocaleString();
          selectedValue.classList.remove("empty");
        } else {
          selectedValue.textContent = "—";
          selectedValue.classList.add("empty");
        }
      }

      function updateStats() {
        const text = textInput.value;
        charactersValue.textContent = text.length.toLocaleString();
        charactersNoSpacesValue.textContent = countCharactersWithoutSpaces(text).toLocaleString();
        wordsValue.textContent = countWords(text).toLocaleString();
        linesValue.textContent = countLines(text).toLocaleString();
        updateSelection();
      }

      function flashButton(btn, text, ms = 1400) {
        const orig = btn.textContent;
        btn.textContent = text;
        setTimeout(() => { btn.textContent = orig; }, ms);
      }

      pasteButton.addEventListener("click", async () => {
        try {
          const clipboardText = await navigator.clipboard.readText();
          textInput.value = clipboardText;
          updateStats();
          textInput.focus();
          textInput.setSelectionRange(textInput.value.length, textInput.value.length);
        } catch {
          textInput.focus();
          const ok = document.execCommand("paste");
          if (!ok) flashButton(pasteButton, "Use Ctrl+V");
        }
      });

      clearButton.addEventListener("click", () => {
        textInput.value = "";
        updateStats();
        textInput.focus();
      });

      detailsButton.addEventListener("click", () => {
        const open = statsSection.classList.toggle("hidden");
        detailsButton.textContent = open ? "Details" : "Hide";
      });

      textInput.addEventListener("input", updateStats);
      textInput.addEventListener("click", updateSelection);
      textInput.addEventListener("keyup", updateSelection);
      textInput.addEventListener("select", updateSelection);

      updateStats();
    </script>
  </body>
</html>
