<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>vibe tools</title>
    <style>
      :root {
        --bg-start: #121826;
        --bg-end: #1d2742;
        --panel: rgba(16, 22, 36, 0.76);
        --panel-border: rgba(160, 190, 255, 0.16);
        --text: #eef2ff;
        --muted: #9ca8c7;
        --muted-strong: #c6d0ea;
        --accent: #7de2ff;
        --accent-strong: #4db9ff;
        --accent-soft: rgba(125, 226, 255, 0.14);
        --shadow: 0 24px 80px rgba(6, 10, 20, 0.42);
        --radius-xl: 24px;
        --radius-lg: 18px;
        --radius-md: 14px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top, rgba(125, 226, 255, 0.18), transparent 26%),
          linear-gradient(145deg, var(--bg-start), var(--bg-end));
      }

      .page {
        width: min(700px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 40px 0 72px;
      }

      .hero {
        margin-bottom: 36px;
      }

      .hero-copy h1 {
        margin: 0 0 12px;
        font-size: clamp(2.6rem, 6vw, 4.5rem);
        line-height: 0.92;
        letter-spacing: -0.05em;
      }

      .hero-copy p {
        margin: 0;
        max-width: 56ch;
        color: var(--muted);
        font-size: 1.02rem;
        line-height: 1.65;
      }

      .tool-card {
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: var(--radius-xl);
        box-shadow: var(--shadow);
        backdrop-filter: blur(22px);
      }

      .section-label {
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-size: 0.78rem;
      }

      .section-label {
        color: var(--muted-strong);
      }

      .catalog {
        display: grid;
        gap: 24px;
      }

      .section {
        display: grid;
        gap: 14px;
      }

      .section-header {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .section-header::after {
        content: "";
        flex: 1;
        height: 1px;
        background: linear-gradient(90deg, rgba(125, 226, 255, 0.28), rgba(125, 226, 255, 0));
      }

      .section-description {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
      }

      .tool-list {
        display: grid;
        gap: 16px;
      }

      .tool-card {
        display: grid;
        gap: 10px;
        padding: 20px 22px;
        text-decoration: none;
        color: inherit;
        transition:
          transform 160ms ease,
          border-color 160ms ease,
          box-shadow 160ms ease,
          background 160ms ease;
      }

      .tool-card:hover,
      .tool-card:focus-visible {
        transform: translateY(-3px);
        border-color: rgba(125, 226, 255, 0.38);
        box-shadow: 0 28px 88px rgba(6, 10, 20, 0.5);
        outline: none;
      }

      .tool-title {
        margin: 0;
        font-size: clamp(1.4rem, 3vw, 1.8rem);
        line-height: 1.05;
      }

      .tool-desc {
        margin: 0;
        color: var(--muted);
        font-size: 0.98rem;
        line-height: 1.62;
      }

      @media (max-width: 760px) {
        .page {
          width: min(100vw - 20px, 700px);
          padding-top: 28px;
        }

        .tool-card {
          padding: 18px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <div class="hero-copy">
          <h1>vibe tools</h1>
          <p>Small standalone HTML tools</p>
        </div>
      </section>

      <section class="catalog">
        <div class="section">
          <div class="section-header">
            <div class="section-label">Text</div>
          </div>

          <div class="tool-list">
            <a class="tool-card" href="./flow.html">
              <h2 class="tool-title">flow</h2>
              <p class="tool-desc">
                Freewrite under pressure. Pause too long — lose everything.
              </p>
            </a>

            <a class="tool-card" href="./charcount.html">
              <h2 class="tool-title">charcount</h2>
              <p class="tool-desc">
                Count characters and words in a text.
              </p>
            </a>
          </div>
        </div>

        <div class="section">
          <div class="section-header">
            <div class="section-label">Images</div>
          </div>

          <div class="tool-list">
            <a class="tool-card" href="./caption.html">
              <h2 class="tool-title">caption</h2>
              <p class="tool-desc">
                Add readable text overlays to images.
              </p>
            </a>

            <a class="tool-card" href="./palette.html">
              <h2 class="tool-title">palette</h2>
              <p class="tool-desc">
                Extract dominant colors from any image.
              </p>
            </a>
          </div>
        </div>

      </section>
    </main>
  </body>
</html>
