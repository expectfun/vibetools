<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>caption</title>
    <style>
      @font-face {
        font-family: "Rubik";
        src: url("./assets/fonts/Rubik-Bold.ttf") format("truetype");
        font-style: normal;
        font-weight: 700;
        font-display: swap;
      }

      @font-face {
        font-family: "PT Sans";
        src: url("./assets/fonts/PTSans-Bold.ttf") format("truetype");
        font-style: normal;
        font-weight: 700;
        font-display: swap;
      }

      @font-face {
        font-family: "Comfortaa";
        src: url("./assets/fonts/Comfortaa-Bold.ttf") format("truetype");
        font-style: normal;
        font-weight: 700;
        font-display: swap;
      }

      @font-face {
        font-family: "Bad Script";
        src: url("./assets/fonts/BadScript-Regular.ttf") format("truetype");
        font-style: normal;
        font-weight: 400;
        font-display: swap;
      }

      @font-face {
        font-family: "Neucha";
        src: url("./assets/fonts/Neucha-Regular.ttf") format("truetype");
        font-style: normal;
        font-weight: 400;
        font-display: swap;
      }

      @font-face {
        font-family: "Caveat";
        src: url("./assets/fonts/Caveat-Bold.ttf") format("truetype");
        font-style: normal;
        font-weight: 700;
        font-display: swap;
      }

      @font-face {
        font-family: "Marmelad";
        src: url("./assets/fonts/Marmelad-Regular.ttf") format("truetype");
        font-style: normal;
        font-weight: 400;
        font-display: swap;
      }

      @font-face {
        font-family: "Pangolin";
        src: url("./assets/fonts/Pangolin-Regular.ttf") format("truetype");
        font-style: normal;
        font-weight: 400;
        font-display: swap;
      }

      :root {
        --bg-start: #121826;
        --bg-end: #1d2742;
        --panel: rgba(16, 22, 36, 0.76);
        --panel-border: rgba(160, 190, 255, 0.16);
        --panel-soft: rgba(8, 12, 22, 0.42);
        --text: #eef2ff;
        --muted: #9ca8c7;
        --muted-strong: #c6d0ea;
        --accent: #7de2ff;
        --accent-strong: #4db9ff;
        --accent-soft: rgba(125, 226, 255, 0.14);
        --shadow: 0 24px 80px rgba(6, 10, 20, 0.42);
        --radius-xl: 24px;
        --radius-lg: 18px;
        --radius-md: 14px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top, rgba(125, 226, 255, 0.16), transparent 28%),
          linear-gradient(145deg, var(--bg-start), var(--bg-end));
      }

      .page {
        width: min(1180px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 40px 0 64px;
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 22px;
        color: var(--muted);
        text-decoration: none;
        font-size: 0.95rem;
        line-height: 1.2;
        transition: color 140ms ease, transform 140ms ease;
      }

      .back-link:hover,
      .back-link:focus-visible {
        color: var(--accent);
        outline: none;
        transform: translateX(-2px);
      }

      .hero {
        margin-bottom: 28px;
      }

      .hero h1 {
        margin: 0 0 10px;
        font-size: clamp(2.2rem, 5vw, 3.6rem);
        line-height: 0.95;
        letter-spacing: -0.04em;
      }

      .hero p {
        margin: 0;
        max-width: 56ch;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.6;
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(0, 1.4fr) minmax(300px, 0.9fr);
        gap: 24px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: var(--radius-xl);
        box-shadow: var(--shadow);
        backdrop-filter: blur(22px);
      }

      .preview-panel {
        padding: 24px;
      }

      .panel-kicker {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 16px;
      }

      .panel-kicker strong {
        font-size: 0.92rem;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--muted-strong);
      }

      .panel-kicker span {
        color: var(--muted);
        font-size: 0.82rem;
      }

      .preview-frame {
        display: grid;
        place-items: center;
        min-height: 540px;
        border-radius: var(--radius-lg);
        border: 1px dashed rgba(160, 190, 255, 0.18);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.01)),
          rgba(9, 13, 24, 0.56);
        overflow: hidden;
      }

      .preview-frame.is-drop-target {
        border-color: rgba(125, 226, 255, 0.5);
        background:
          linear-gradient(180deg, rgba(125, 226, 255, 0.12), rgba(255, 255, 255, 0.02)),
          rgba(9, 13, 24, 0.62);
        box-shadow: inset 0 0 0 1px rgba(125, 226, 255, 0.18);
      }

      .preview-canvas {
        width: auto;
        height: auto;
        max-width: 100%;
        max-height: 70vh;
        border-radius: 16px;
        display: none;
      }

      .empty-state {
        max-width: 42ch;
        text-align: center;
        padding: 28px;
      }

      .empty-state h2 {
        margin: 0 0 16px;
        font-size: 1.6rem;
      }

      .empty-state p {
        margin: 0 0 18px;
        color: var(--muted);
        line-height: 1.6;
      }

      .browse-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 160px;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .controls-panel {
        padding: 24px;
      }

      .controls-header {
        margin-bottom: 22px;
      }

      .controls-header h2 {
        margin: 0 0 8px;
        font-size: 1.15rem;
      }

      .controls-header p {
        margin: 0;
        color: var(--muted);
        line-height: 1.5;
      }

      .control-stack {
        display: grid;
        gap: 18px;
      }

      .control-group {
        display: grid;
        gap: 10px;
      }

      .control-group label,
      .control-title {
        font-size: 0.9rem;
        font-weight: 600;
        color: #d7def5;
      }

      input[type="file"],
      input[type="text"],
      select,
      button {
        width: 100%;
        border: 1px solid rgba(160, 190, 255, 0.18);
        border-radius: var(--radius-md);
        background: rgba(7, 11, 20, 0.72);
        color: var(--text);
        font: inherit;
      }

      input[type="file"] {
        padding: 16px;
        border-style: dashed;
        background:
          linear-gradient(180deg, rgba(125, 226, 255, 0.08), rgba(125, 226, 255, 0.03)),
          rgba(7, 11, 20, 0.72);
      }

      input[type="text"],
      select,
      button {
        padding: 14px 16px;
      }

      input[type="text"] {
        min-height: 52px;
      }

      select,
      input[type="text"],
      input[type="file"] {
        transition:
          border-color 140ms ease,
          background 140ms ease,
          box-shadow 140ms ease,
          transform 140ms ease;
      }

      select:hover,
      input[type="text"]:hover,
      input[type="file"]:hover {
        border-color: rgba(125, 226, 255, 0.26);
      }

      select:focus,
      input[type="text"]:focus,
      input[type="file"]:focus {
        outline: none;
        border-color: rgba(125, 226, 255, 0.42);
        box-shadow: 0 0 0 4px rgba(125, 226, 255, 0.08);
      }

      select {
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0)),
          rgba(7, 11, 20, 0.72);
      }

      button {
        cursor: pointer;
        background: linear-gradient(135deg, var(--accent), var(--accent-strong));
        color: #08111d;
        font-weight: 700;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      select,
      input[type="file"] {
        appearance: none;
      }

      @media (max-width: 920px) {
        .workspace {
          grid-template-columns: 1fr;
        }

        .preview-frame {
          min-height: 420px;
        }
      }

      @media (max-width: 640px) {
        .page {
          width: min(100vw - 20px, 1180px);
          padding-top: 28px;
        }

        .preview-panel,
        .controls-panel {
          padding: 18px;
        }

      }
    </style>
  </head>
  <body>
    <main class="page">
      <a class="back-link" href="./index.html">← all tools</a>

      <section class="hero">
        <h1>caption</h1>
        <p>Add text to images.</p>
      </section>

      <section class="workspace">
        <div class="panel preview-panel">
          <div class="panel-kicker">
            <strong>Live preview</strong>
            <span data-preview-status>waiting for image</span>
          </div>

          <div class="preview-frame" data-preview-frame>
            <canvas class="preview-canvas" data-preview-canvas></canvas>

            <div class="empty-state" data-empty-state>
              <h2>Drop in an image and start captioning.</h2>
              <button type="button" class="browse-button" data-empty-browse-button>Browse</button>
            </div>
          </div>
        </div>

        <aside class="panel controls-panel">
          <div class="controls-header">
            <h2>Controls</h2>
          </div>

          <form class="control-stack" data-caption-form>
            <div class="control-group">
              <label for="image">Source image</label>
              <input id="image" name="image" type="file" accept="image/*" />
            </div>

            <div class="control-group">
              <label for="top-caption">Top caption</label>
              <input
                id="top-caption"
                name="topCaption"
                type="text"
                placeholder="Write the caption that should sit on the upper gradient."
              />
            </div>

            <div class="control-group">
              <label for="caption">Bottom caption</label>
              <input
                id="caption"
                name="caption"
                type="text"
                placeholder="Write the caption that should sit on the lower gradient."
              />
            </div>

            <div class="control-group">
              <label for="font">Font</label>
              <select id="font" name="font"></select>
            </div>

            <div class="control-group">
              <label for="size">Text size</label>
              <select id="size" name="size"></select>
            </div>

            <div class="control-group">
              <label for="ratio">Aspect ratio</label>
              <select id="ratio" name="ratio"></select>
            </div>

            <div class="control-group">
              <label for="export-format">Export format</label>
              <select id="export-format" name="exportFormat"></select>
            </div>

            <button type="button" disabled data-download-button>Download image</button>
          </form>
        </aside>
      </section>
    </main>

    <script type="module">
      const FONT_OPTIONS = [
        {
          id: "rubik-bold",
          label: "Rubik Bold",
          loadFamily: "Rubik",
          fontWeight: 700,
          fontFamily: '"Rubik", "Segoe UI", sans-serif',
          typography: { sizeMultiplier: 1, lineHeightMultiplier: 1.08 }
        },
        {
          id: "pt-sans-bold",
          label: "PT Sans Bold",
          loadFamily: "PT Sans",
          fontWeight: 700,
          fontFamily: '"PT Sans", "Segoe UI", sans-serif',
          typography: { sizeMultiplier: 0.98, lineHeightMultiplier: 1.08 }
        },
        {
          id: "comfortaa-bold",
          label: "Comfortaa Bold",
          loadFamily: "Comfortaa",
          fontWeight: 700,
          fontFamily: '"Comfortaa", "Segoe UI", sans-serif',
          typography: { sizeMultiplier: 0.92, lineHeightMultiplier: 1.16 }
        },
        {
          id: "bad-script",
          label: "Bad Script",
          loadFamily: "Bad Script",
          fontWeight: 400,
          fontFamily: '"Bad Script", "Segoe UI", cursive',
          typography: { sizeMultiplier: 1.08, lineHeightMultiplier: 1.22 }
        },
        {
          id: "neucha",
          label: "Neucha",
          loadFamily: "Neucha",
          fontWeight: 400,
          fontFamily: '"Neucha", "Segoe UI", cursive',
          typography: { sizeMultiplier: 1.02, lineHeightMultiplier: 1.16 }
        },
        {
          id: "caveat-bold",
          label: "Caveat Bold",
          loadFamily: "Caveat",
          fontWeight: 700,
          fontFamily: '"Caveat", "Segoe UI", cursive',
          typography: { sizeMultiplier: 1.14, lineHeightMultiplier: 1.06 }
        },
        {
          id: "marmelad",
          label: "Marmelad",
          loadFamily: "Marmelad",
          fontWeight: 400,
          fontFamily: '"Marmelad", "Segoe UI", sans-serif',
          typography: { sizeMultiplier: 0.98, lineHeightMultiplier: 1.1 }
        },
        {
          id: "pangolin",
          label: "Pangolin",
          loadFamily: "Pangolin",
          fontWeight: 400,
          fontFamily: '"Pangolin", "Segoe UI", cursive',
          typography: { sizeMultiplier: 0.98, lineHeightMultiplier: 1.14 }
        }
      ];

      const TEXT_SIZE_OPTIONS = [
        { id: "small", label: "Small", scale: 0.72 },
        { id: "medium", label: "Medium", scale: 1 },
        { id: "large", label: "Large", scale: 1.28 }
      ];

      const ASPECT_RATIO_OPTIONS = [
        { id: "original", label: "Same as image", width: null, height: null },
        { id: "4:5", label: "4:5", width: 4, height: 5 },
        { id: "3:2", label: "3:2", width: 3, height: 2 },
        { id: "2:3", label: "2:3", width: 2, height: 3 },
        { id: "9:16", label: "9:16", width: 9, height: 16 }
      ];

      const EXPORT_FORMAT_OPTIONS = [
        { id: "jpg", label: "JPG", mimeType: "image/jpeg", extension: "jpg", quality: 0.9 },
        { id: "png", label: "PNG", mimeType: "image/png", extension: "png", quality: undefined }
      ];

      const DEFAULT_STATE = {
        image: null,
        topCaption: "",
        caption: "",
        fontId: FONT_OPTIONS[0].id,
        textSizeId: TEXT_SIZE_OPTIONS[1].id,
        aspectRatioId: ASPECT_RATIO_OPTIONS[0].id,
        exportFormat: EXPORT_FORMAT_OPTIONS[0].id
      };

      function createStampState(overrides = {}) {
        return {
          ...DEFAULT_STATE,
          ...overrides
        };
      }

      function getAspectRatioOption(id) {
        return ASPECT_RATIO_OPTIONS.find((option) => option.id === id) ?? ASPECT_RATIO_OPTIONS[0];
      }

      function getFontOption(id) {
        return FONT_OPTIONS.find((option) => option.id === id) ?? FONT_OPTIONS[0];
      }

      function getTextSizeOption(id) {
        return TEXT_SIZE_OPTIONS.find((option) => option.id === id) ?? TEXT_SIZE_OPTIONS[1];
      }

      function getExportFormatOption(id) {
        return EXPORT_FORMAT_OPTIONS.find((option) => option.id === id) ?? EXPORT_FORMAT_OPTIONS[0];
      }

      function resolveOutputSize(sourceWidth, sourceHeight, aspectRatioId = "original") {
        if (
          !Number.isFinite(sourceWidth) ||
          !Number.isFinite(sourceHeight) ||
          sourceWidth <= 0 ||
          sourceHeight <= 0
        ) {
          throw new Error("Source image dimensions must be positive numbers.");
        }

        const ratio = getAspectRatioOption(aspectRatioId);

        if (!ratio.width || !ratio.height) {
          return { width: Math.round(sourceWidth), height: Math.round(sourceHeight) };
        }

        const sourceRatio = sourceWidth / sourceHeight;
        const targetRatio = ratio.width / ratio.height;

        if (sourceRatio > targetRatio) {
          return { width: Math.round(sourceHeight * targetRatio), height: Math.round(sourceHeight) };
        }

        return { width: Math.round(sourceWidth), height: Math.round(sourceWidth / targetRatio) };
      }

      function resolveImageCrop(sourceWidth, sourceHeight, outputWidth, outputHeight) {
        if (
          !Number.isFinite(sourceWidth) ||
          !Number.isFinite(sourceHeight) ||
          !Number.isFinite(outputWidth) ||
          !Number.isFinite(outputHeight) ||
          sourceWidth <= 0 ||
          sourceHeight <= 0 ||
          outputWidth <= 0 ||
          outputHeight <= 0
        ) {
          throw new Error("Image crop dimensions must be positive numbers.");
        }

        const sourceRatio = sourceWidth / sourceHeight;
        const outputRatio = outputWidth / outputHeight;

        if (Math.abs(sourceRatio - outputRatio) < 0.0001) {
          return { sx: 0, sy: 0, sw: sourceWidth, sh: sourceHeight };
        }

        if (sourceRatio > outputRatio) {
          const sw = sourceHeight * outputRatio;
          return {
            sx: (sourceWidth - sw) / 2,
            sy: 0,
            sw,
            sh: sourceHeight
          };
        }

        const sh = sourceWidth / outputRatio;
        return {
          sx: 0,
          sy: (sourceHeight - sh) / 2,
          sw: sourceWidth,
          sh
        };
      }

      function resolveTextLayout(outputWidth, outputHeight, textSizeId = "medium", fontId = FONT_OPTIONS[0].id) {
        if (
          !Number.isFinite(outputWidth) ||
          !Number.isFinite(outputHeight) ||
          outputWidth <= 0 ||
          outputHeight <= 0
        ) {
          throw new Error("Text layout dimensions must be positive numbers.");
        }

        const textSize = getTextSizeOption(textSizeId);
        const font = getFontOption(fontId);
        const typography = font.typography ?? { sizeMultiplier: 1, lineHeightMultiplier: 1.1 };
        const base = Math.min(outputWidth, outputHeight);
        const horizontalPadding = Math.max(24, Math.round(outputWidth * 0.06));
        const bottomPadding = Math.max(28, Math.round(outputHeight * 0.06));
        const maxWidth = outputWidth - horizontalPadding * 2;
        const fontSize = Math.max(
          24,
          Math.round(base * 0.075 * textSize.scale * typography.sizeMultiplier)
        );
        const lineHeight = Math.max(fontSize + 4, Math.round(fontSize * typography.lineHeightMultiplier));
        const maxLines = outputHeight >= outputWidth ? 4 : 3;

        return {
          fontSize,
          lineHeight,
          horizontalPadding,
          bottomPadding,
          maxWidth,
          maxLines
        };
      }

      function buildRenderModel(state, imageMeta) {
        if (!imageMeta || !Number.isFinite(imageMeta.width) || !Number.isFinite(imageMeta.height)) {
          throw new Error("Image metadata is required to build the render model.");
        }

        const output = resolveOutputSize(imageMeta.width, imageMeta.height, state.aspectRatioId);
        const font = getFontOption(state.fontId);
        const textSize = getTextSizeOption(state.textSizeId);

        return {
          hasTopCaption: state.topCaption.trim().length > 0,
          hasBottomCaption: state.caption.trim().length > 0,
          image: {
            width: imageMeta.width,
            height: imageMeta.height
          },
          output,
          crop: resolveImageCrop(imageMeta.width, imageMeta.height, output.width, output.height),
          topCaption: state.topCaption.trim(),
          bottomCaption: state.caption.trim(),
          font,
          textSize,
          textLayout: resolveTextLayout(output.width, output.height, state.textSizeId, state.fontId),
          gradients: {
            top: {
              from: "rgba(0, 0, 0, 0.88)",
              to: "rgba(0, 0, 0, 0)",
              heightRatio: 0.42
            },
            bottom: {
              from: "rgba(0, 0, 0, 0.88)",
              to: "rgba(0, 0, 0, 0)",
              heightRatio: 0.48
            }
          }
        };
      }

      function formatDimensions({ width, height }) {
        return `${width}x${height}`;
      }

      function wrapText(context, text, maxWidth, maxLines) {
        const words = text.split(/\s+/).filter(Boolean);

        if (words.length === 0) {
          return [""];
        }

        const lines = [];
        let current = words[0];

        for (const word of words.slice(1)) {
          const candidate = `${current} ${word}`;

          if (context.measureText(candidate).width <= maxWidth) {
            current = candidate;
            continue;
          }

          lines.push(current);
          current = word;
        }

        lines.push(current);

        if (typeof maxLines === "number" && maxLines > 0 && lines.length > maxLines) {
          const visible = lines.slice(0, maxLines);
          visible[maxLines - 1] = truncateLine(context, visible[maxLines - 1], maxWidth);
          return visible;
        }

        return lines;
      }

      function truncateLine(context, text, maxWidth) {
        const ellipsis = "…";
        let value = text.trim();

        while (value.length > 0 && context.measureText(`${value}${ellipsis}`).width > maxWidth) {
          value = value.slice(0, -1).trimEnd();
        }

        return value.length === 0 ? ellipsis : `${value}${ellipsis}`;
      }

      async function loadImage(file) {
        const objectUrl = URL.createObjectURL(file);

        try {
          const image = new Image();
          image.decoding = "async";
          image.src = objectUrl;
          await image.decode();

          return {
            element: image,
            width: image.naturalWidth,
            height: image.naturalHeight
          };
        } finally {
          URL.revokeObjectURL(objectUrl);
        }
      }

      const form = document.querySelector("[data-caption-form]");
      const previewFrame = document.querySelector("[data-preview-frame]");
      const previewCanvas = document.querySelector("[data-preview-canvas]");
      const emptyState = document.querySelector("[data-empty-state]");
      const previewStatus = document.querySelector("[data-preview-status]");
      const downloadButton = document.querySelector("[data-download-button]");
      const emptyBrowseButton = document.querySelector("[data-empty-browse-button]");

      const state = createStampState();
      const loadedFontRequests = new Map();
      let previewRenderToken = 0;
      let dragDepth = 0;

      populateSelect("font", FONT_OPTIONS, state.fontId);
      populateSelect("size", TEXT_SIZE_OPTIONS, state.textSizeId);
      populateSelect("ratio", ASPECT_RATIO_OPTIONS, state.aspectRatioId);
      populateSelect("exportFormat", EXPORT_FORMAT_OPTIONS, state.exportFormat);

      emptyBrowseButton?.addEventListener("click", () => {
        const imageInput = form?.elements.namedItem("image");

        if (imageInput instanceof HTMLInputElement) {
          imageInput.click();
        }
      });

      previewFrame?.addEventListener("dragenter", (event) => {
        if (!hasImageFile(event.dataTransfer)) {
          return;
        }

        event.preventDefault();
        dragDepth += 1;
        previewFrame.classList.add("is-drop-target");
      });

      previewFrame?.addEventListener("dragover", (event) => {
        if (!hasImageFile(event.dataTransfer)) {
          return;
        }

        event.preventDefault();
        if (event.dataTransfer) {
          event.dataTransfer.dropEffect = "copy";
        }
        previewFrame.classList.add("is-drop-target");
      });

      previewFrame?.addEventListener("dragleave", (event) => {
        if (!hasImageFile(event.dataTransfer)) {
          return;
        }

        dragDepth = Math.max(0, dragDepth - 1);

        if (dragDepth === 0) {
          previewFrame.classList.remove("is-drop-target");
        }
      });

      previewFrame?.addEventListener("drop", async (event) => {
        if (!hasImageFile(event.dataTransfer)) {
          return;
        }

        event.preventDefault();
        dragDepth = 0;
        previewFrame.classList.remove("is-drop-target");
        const file = getFirstImageFile(event.dataTransfer);

        if (file) {
          await handleImageFile(file);
        }
      });

      form?.addEventListener("input", (event) => {
        const target = event.target;

        if (
          !(target instanceof HTMLInputElement) &&
          !(target instanceof HTMLSelectElement) &&
          !(target instanceof HTMLTextAreaElement)
        ) {
          return;
        }

        if (target.name === "topCaption") {
          state.topCaption = target.value;
          renderPreview();
          return;
        }

        if (target.name === "caption") {
          state.caption = target.value;
          renderPreview();
          return;
        }

        if (target.name === "font") {
          state.fontId = target.value;
          renderPreview();
          return;
        }

        if (target.name === "size") {
          state.textSizeId = target.value;
          renderPreview();
          return;
        }

        if (target.name === "ratio") {
          state.aspectRatioId = target.value;
          renderPreview();
          return;
        }

        if (target.name === "exportFormat") {
          state.exportFormat = target.value;
        }
      });

      form?.addEventListener("change", async (event) => {
        const target = event.target;

        if (!(target instanceof HTMLInputElement) || target.name !== "image") {
          return;
        }

        const [file] = target.files ?? [];

        if (!file) {
          state.image = null;
          renderPreview();
          return;
        }

        await handleImageFile(file);
      });

      downloadButton?.addEventListener("click", async () => {
        if (!(previewCanvas instanceof HTMLCanvasElement) || !state.image) {
          return;
        }

        downloadButton.setAttribute("disabled", "disabled");
        const exportFormat = getExportFormatOption(state.exportFormat);

        try {
          const blob = await canvasToBlob(previewCanvas, exportFormat);
          const link = document.createElement("a");
          const url = URL.createObjectURL(blob);
          link.href = url;
          link.download = buildDownloadName(exportFormat);
          link.click();
          URL.revokeObjectURL(url);
        } finally {
          downloadButton.removeAttribute("disabled");
        }
      });

      function populateSelect(name, options, selectedId) {
        const select = form?.elements.namedItem(name);

        if (!(select instanceof HTMLSelectElement)) {
          return;
        }

        select.innerHTML = "";

        for (const option of options) {
          const node = document.createElement("option");
          node.value = option.id;
          node.textContent = option.label;
          node.selected = option.id === selectedId;
          select.append(node);
        }
      }

      function hasImageFile(dataTransfer) {
        if (!dataTransfer) {
          return false;
        }

        const items = Array.from(dataTransfer.items ?? []);
        if (items.some((item) => item.kind === "file" && item.type.startsWith("image/"))) {
          return true;
        }

        return Boolean(getFirstImageFile(dataTransfer));
      }

      function getFirstImageFile(dataTransfer) {
        const files = Array.from(dataTransfer?.files ?? []);
        return files.find((file) => file.type.startsWith("image/")) ?? null;
      }

      async function handleImageFile(file) {
        try {
          state.image = await loadImage(file);

          const imageInput = form?.elements.namedItem("image");
          if (imageInput instanceof HTMLInputElement && "files" in imageInput) {
            const transfer = new DataTransfer();
            transfer.items.add(file);
            imageInput.files = transfer.files;
          }

          renderPreview();
        } catch (error) {
          state.image = null;
          renderPreview();
        }
      }

      async function renderPreview() {
        if (!(previewCanvas instanceof HTMLCanvasElement) || !(emptyState instanceof HTMLElement)) {
          return;
        }

        const context = previewCanvas.getContext("2d");

        if (!context) {
          return;
        }

        if (!state.image) {
          previewCanvas.style.display = "none";
          emptyState.style.display = "block";
          previewStatus.textContent = "waiting for image";
          downloadButton?.setAttribute("disabled", "disabled");
          return;
        }

        const model = buildRenderModel(state, state.image);
        const renderToken = ++previewRenderToken;
        await ensureFontLoaded(model.font, model.textLayout.fontSize);

        if (renderToken !== previewRenderToken) {
          return;
        }

        previewCanvas.width = model.output.width;
        previewCanvas.height = model.output.height;
        previewCanvas.style.display = "block";
        emptyState.style.display = "none";

        context.clearRect(0, 0, model.output.width, model.output.height);
        context.fillStyle = "#080d16";
        context.fillRect(0, 0, model.output.width, model.output.height);
        context.drawImage(
          state.image.element,
          model.crop.sx,
          model.crop.sy,
          model.crop.sw,
          model.crop.sh,
          0,
          0,
          model.output.width,
          model.output.height
        );

        if (model.hasTopCaption) {
          const topGradient = context.createLinearGradient(
            0,
            0,
            0,
            model.output.height * model.gradients.top.heightRatio
          );
          topGradient.addColorStop(0, model.gradients.top.from);
          topGradient.addColorStop(1, model.gradients.top.to);
          context.fillStyle = topGradient;
          context.fillRect(
            0,
            0,
            model.output.width,
            model.output.height * model.gradients.top.heightRatio
          );
        }

        if (model.hasBottomCaption) {
          const bottomGradient = context.createLinearGradient(
            0,
            model.output.height,
            0,
            model.output.height * (1 - model.gradients.bottom.heightRatio)
          );
          bottomGradient.addColorStop(0, model.gradients.bottom.from);
          bottomGradient.addColorStop(1, model.gradients.bottom.to);
          context.fillStyle = bottomGradient;
          context.fillRect(
            0,
            model.output.height * (1 - model.gradients.bottom.heightRatio),
            model.output.width,
            model.output.height * model.gradients.bottom.heightRatio
          );
        }

        context.fillStyle = "#ffffff";
        context.font = `${model.textLayout.fontSize}px ${model.font.fontFamily}`;
        context.textAlign = "center";
        context.shadowColor = "rgba(0, 0, 0, 0.25)";
        context.shadowBlur = 18;
        context.shadowOffsetY = 2;

        if (model.hasTopCaption) {
          context.textBaseline = "top";
          const topLines = wrapText(
            context,
            model.topCaption,
            model.textLayout.maxWidth,
            model.textLayout.maxLines
          );
          let topY = model.textLayout.bottomPadding;

          for (const line of topLines) {
            context.fillText(line, model.output.width / 2, topY);
            topY += model.textLayout.lineHeight;
          }
        }

        context.textBaseline = "bottom";
        if (model.hasBottomCaption) {
          const bottomLines = wrapText(
            context,
            model.bottomCaption,
            model.textLayout.maxWidth,
            model.textLayout.maxLines
          );
          let bottomY =
            model.output.height -
            model.textLayout.bottomPadding -
            model.textLayout.lineHeight * (bottomLines.length - 1);

          for (const line of bottomLines) {
            context.fillText(line, model.output.width / 2, bottomY);
            bottomY += model.textLayout.lineHeight;
          }
        }

        previewStatus.textContent = formatDimensions(model.output);
        downloadButton?.removeAttribute("disabled");
      }

      async function ensureFontLoaded(font, fontSize) {
        if (!("fonts" in document) || !font?.loadFamily) {
          return;
        }

        const requestKey = `${font.loadFamily}:${font.fontWeight}:${fontSize}`;

        if (!loadedFontRequests.has(requestKey)) {
          const fontSpec = `${font.fontWeight} ${fontSize}px "${font.loadFamily}"`;
          loadedFontRequests.set(
            requestKey,
            document.fonts.load(fontSpec).catch(() => {
              loadedFontRequests.delete(requestKey);
            })
          );
        }

        await loadedFontRequests.get(requestKey);
      }

      async function canvasToBlob(canvas, exportFormat) {
        return new Promise((resolve, reject) => {
          canvas.toBlob((blob) => {
            if (blob) {
              resolve(blob);
              return;
            }

            reject(new Error("Canvas export returned an empty blob."));
          }, exportFormat.mimeType, exportFormat.quality);
        });
      }

      function buildDownloadName(exportFormat = getExportFormatOption(state.exportFormat)) {
        const ratio = getAspectRatioOption(state.aspectRatioId).id.replace(":", "-");
        return `caption-${ratio}.${exportFormat.extension}`;
      }

      renderPreview();
    </script>
  </body>
</html>
