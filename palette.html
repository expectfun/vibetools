<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>palette</title>
    <style>
      :root {
        --bg-start: #121826;
        --bg-end: #1d2742;
        --panel: rgba(16, 22, 36, 0.76);
        --panel-border: rgba(160, 190, 255, 0.16);
        --panel-soft: rgba(8, 12, 22, 0.42);
        --text: #eef2ff;
        --muted: #9ca8c7;
        --muted-strong: #c6d0ea;
        --accent: #7de2ff;
        --accent-strong: #4db9ff;
        --accent-soft: rgba(125, 226, 255, 0.14);
        --shadow: 0 24px 80px rgba(6, 10, 20, 0.42);
        --radius-xl: 24px;
        --radius-lg: 18px;
        --radius-md: 14px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top, rgba(125, 226, 255, 0.16), transparent 28%),
          linear-gradient(145deg, var(--bg-start), var(--bg-end));
      }

      .page {
        width: min(1180px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 40px 0 64px;
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 22px;
        color: var(--muted);
        text-decoration: none;
        font-size: 0.95rem;
        line-height: 1.2;
        transition: color 140ms ease, transform 140ms ease;
      }

      .back-link:hover,
      .back-link:focus-visible {
        color: var(--accent);
        outline: none;
        transform: translateX(-2px);
      }

      .hero {
        margin-bottom: 28px;
      }

      .hero h1 {
        margin: 0 0 10px;
        font-size: clamp(2.2rem, 5vw, 3.6rem);
        line-height: 0.95;
        letter-spacing: -0.04em;
      }

      .hero p {
        margin: 0;
        max-width: 56ch;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.6;
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(0, 1.4fr) minmax(300px, 0.9fr);
        gap: 24px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: var(--radius-xl);
        box-shadow: var(--shadow);
        backdrop-filter: blur(22px);
      }

      .preview-panel {
        padding: 24px;
      }

      .panel-kicker {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 16px;
      }

      .panel-kicker strong {
        font-size: 0.92rem;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--muted-strong);
      }

      .panel-kicker span {
        color: var(--muted);
        font-size: 0.82rem;
      }

      .preview-frame {
        display: grid;
        place-items: center;
        min-height: 400px;
        border-radius: var(--radius-lg);
        border: 1px dashed rgba(160, 190, 255, 0.18);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.01)),
          rgba(9, 13, 24, 0.56);
        overflow: hidden;
      }

      .preview-frame.is-drop-target {
        border-color: rgba(125, 226, 255, 0.5);
        background:
          linear-gradient(180deg, rgba(125, 226, 255, 0.12), rgba(255, 255, 255, 0.02)),
          rgba(9, 13, 24, 0.62);
        box-shadow: inset 0 0 0 1px rgba(125, 226, 255, 0.18);
      }

      .preview-image {
        width: auto;
        height: auto;
        max-width: 100%;
        max-height: 50vh;
        border-radius: 12px;
        display: none;
        object-fit: contain;
      }

      .empty-state {
        max-width: 42ch;
        text-align: center;
        padding: 28px;
      }

      .empty-state h2 {
        margin: 0 0 16px;
        font-size: 1.6rem;
      }

      .empty-state p {
        margin: 0 0 18px;
        color: var(--muted);
        line-height: 1.6;
      }

      .browse-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 160px;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      /* --- Palette swatches --- */

      .palette-section {
        margin-top: 20px;
        display: none;
      }

      .palette-section.is-visible {
        display: block;
      }

      .palette-grid {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 12px;
      }

      .swatch {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        padding: 10px 4px;
        border-radius: var(--radius-md);
        border: 1px solid transparent;
        background: transparent;
        transition: border-color 140ms ease, background 140ms ease;
      }

      .swatch:hover {
        border-color: rgba(125, 226, 255, 0.22);
        background: rgba(125, 226, 255, 0.06);
      }

      .swatch-color {
        width: 100%;
        aspect-ratio: 1;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
      }

      .swatch-label {
        font-size: 0.78rem;
        font-weight: 600;
        color: var(--muted-strong);
        letter-spacing: 0.02em;
        text-align: center;
        word-break: break-all;
        line-height: 1.3;
      }

      .swatch-copied {
        font-size: 0.72rem;
        color: var(--accent);
        font-weight: 700;
        opacity: 0;
        transition: opacity 200ms ease;
        height: 1em;
      }

      .swatch-copied.is-visible {
        opacity: 1;
      }

      /* --- Controls panel --- */

      .controls-panel {
        padding: 24px;
      }

      .controls-header {
        margin-bottom: 22px;
      }

      .controls-header h2 {
        margin: 0 0 8px;
        font-size: 1.15rem;
      }

      .controls-header p {
        margin: 0;
        color: var(--muted);
        line-height: 1.5;
      }

      .control-stack {
        display: grid;
        gap: 18px;
      }

      .control-group {
        display: grid;
        gap: 10px;
      }

      .control-group label {
        font-size: 0.9rem;
        font-weight: 600;
        color: #d7def5;
      }

      input[type="file"],
      select,
      button {
        width: 100%;
        border: 1px solid rgba(160, 190, 255, 0.18);
        border-radius: var(--radius-md);
        background: rgba(7, 11, 20, 0.72);
        color: var(--text);
        font: inherit;
      }

      input[type="file"] {
        padding: 16px;
        border-style: dashed;
        background:
          linear-gradient(180deg, rgba(125, 226, 255, 0.08), rgba(125, 226, 255, 0.03)),
          rgba(7, 11, 20, 0.72);
      }

      select,
      button {
        padding: 14px 16px;
      }

      select,
      input[type="file"] {
        transition:
          border-color 140ms ease,
          background 140ms ease,
          box-shadow 140ms ease;
        appearance: none;
      }

      select:hover,
      input[type="file"]:hover {
        border-color: rgba(125, 226, 255, 0.26);
      }

      select:focus,
      input[type="file"]:focus {
        outline: none;
        border-color: rgba(125, 226, 255, 0.42);
        box-shadow: 0 0 0 4px rgba(125, 226, 255, 0.08);
      }

      select {
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0)),
          rgba(7, 11, 20, 0.72);
      }

      button {
        cursor: pointer;
        background: linear-gradient(135deg, var(--accent), var(--accent-strong));
        color: #08111d;
        font-weight: 700;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .copy-all-btn {
        all: unset;
        cursor: pointer;
        font-size: 0.78rem;
        font-weight: 600;
        letter-spacing: 0.04em;
        color: var(--accent);
        padding: 4px 10px;
        border-radius: 8px;
        border: 1px solid rgba(125, 226, 255, 0.24);
        transition: border-color 140ms ease, background 140ms ease;
      }

      .copy-all-btn:hover {
        border-color: rgba(125, 226, 255, 0.48);
        background: rgba(125, 226, 255, 0.08);
      }

      .copy-all-btn:active {
        background: rgba(125, 226, 255, 0.14);
      }

      /* --- Canvas for export (hidden) --- */

      .export-canvas {
        display: none;
      }

      @media (max-width: 920px) {
        .workspace {
          grid-template-columns: 1fr;
        }

        .preview-frame {
          min-height: 300px;
        }

        .palette-grid {
          grid-template-columns: repeat(3, 1fr);
        }
      }

      @media (max-width: 640px) {
        .page {
          width: min(100vw - 20px, 1180px);
          padding-top: 28px;
        }

        .preview-panel,
        .controls-panel {
          padding: 18px;
        }

        .palette-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <a class="back-link" href="./index.html">← all tools</a>

      <section class="hero">
        <h1>palette</h1>
        <p>Extract dominant colors from any image.</p>
      </section>

      <section class="workspace">
        <div class="panel preview-panel">
          <div class="panel-kicker">
            <strong>Source image</strong>
            <span data-preview-status>waiting for image</span>
          </div>

          <div class="preview-frame" data-preview-frame>
            <img class="preview-image" data-preview-image alt="Uploaded image preview" />

            <div class="empty-state" data-empty-state>
              <h2>Drop in an image to extract its palette.</h2>
              <p>Upload a photo and see the dominant colors instantly.</p>
              <button type="button" class="browse-button" data-empty-browse-button>Browse</button>
            </div>
          </div>

          <div class="palette-section" data-palette-section>
            <div class="panel-kicker" style="margin-top: 8px;">
              <strong>Extracted palette</strong>
              <button type="button" class="copy-all-btn" data-copy-all-button>Copy all</button>
            </div>
            <div class="palette-grid" data-palette-grid></div>
          </div>
        </div>

        <aside class="panel controls-panel">
          <div class="controls-header">
            <h2>Controls</h2>
            <p>Upload an image and configure the output.</p>
          </div>

          <div class="control-stack">
            <div class="control-group">
              <label for="image">Source image</label>
              <input id="image" name="image" type="file" accept="image/*" data-file-input />
            </div>

            <div class="control-group">
              <label for="format">Color format</label>
              <select id="format" data-format-select>
                <option value="hex" selected>HEX</option>
                <option value="rgb">RGB</option>
              </select>
            </div>

            <button type="button" disabled data-download-button>Download palette card</button>
          </div>
        </aside>
      </section>
    </main>

    <canvas class="export-canvas" data-export-canvas></canvas>

    <script type="module">
      // ── Color extraction (inline copy of core logic for self-contained HTML) ──

      function rgbToHex(r, g, b) {
        return "#" + [r, g, b]
          .map((c) => Math.max(0, Math.min(255, Math.round(c))).toString(16).padStart(2, "0"))
          .join("")
          .toUpperCase();
      }

      function formatRgb(r, g, b) {
        return `rgb(${Math.round(r)}, ${Math.round(g)}, ${Math.round(b)})`;
      }

      function luminance({ r, g, b }) {
        return 0.299 * r + 0.587 * g + 0.114 * b;
      }

      function sortByLuminance(colors) {
        return [...colors].sort((a, b) => luminance(a) - luminance(b));
      }

      function samplePixels(data, pixelCount, maxSamples = 10000) {
        const step = Math.max(1, Math.floor(pixelCount / maxSamples));
        const samples = [];

        for (let i = 0; i < pixelCount; i += step) {
          const offset = i * 4;
          if (data[offset + 3] < 10) continue;
          samples.push([data[offset], data[offset + 1], data[offset + 2]]);
        }

        return samples;
      }

      function colorDistance(a, b) {
        const dr = a.r - b.r, dg = a.g - b.g, db = a.b - b.b;
        return dr * dr + dg * dg + db * db;
      }

      function quantize(pixels, colorCount = 6) {
        if (!pixels || pixels.length === 0) return [];
        if (pixels.length <= colorCount) return pixels.map(([r, g, b]) => ({ r, g, b }));

        // Over-quantize into many boxes so small but distinct clusters
        // (e.g. white text on dark background) survive averaging
        const overFactor = Math.min(pixels.length, colorCount * 8);
        let boxes = [{ pixels }];

        while (boxes.length < overFactor) {
          let targetIndex = 0;
          let maxRange = -1;

          for (let i = 0; i < boxes.length; i++) {
            const range = largestChannelRange(boxes[i]);
            if (range > maxRange) {
              maxRange = range;
              targetIndex = i;
            }
          }

          if (maxRange === 0) break;

          const box = boxes[targetIndex];
          const channel = widestChannel(box);
          const sorted = [...box.pixels].sort((a, b) => a[channel] - b[channel]);
          const mid = Math.floor(sorted.length / 2);

          boxes.splice(targetIndex, 1, { pixels: sorted.slice(0, mid) }, { pixels: sorted.slice(mid) });
        }

        const candidates = boxes.map((box) => {
          const count = box.pixels.length;
          if (count === 0) return { r: 0, g: 0, b: 0 };
          let rS = 0, gS = 0, bS = 0;
          for (const [r, g, b] of box.pixels) { rS += r; gS += g; bS += b; }
          return { r: Math.round(rS / count), g: Math.round(gS / count), b: Math.round(bS / count) };
        });

        return selectDistinct(candidates, colorCount);
      }

      function selectDistinct(candidates, count) {
        if (candidates.length <= count) return candidates;

        const sorted = [...candidates].sort((a, b) => luminance(a) - luminance(b));
        const selected = [sorted[0]];
        const used = new Set([candidates.indexOf(sorted[0])]);

        while (selected.length < count) {
          let bestIndex = -1;
          let bestMinDist = -1;

          for (let i = 0; i < candidates.length; i++) {
            if (used.has(i)) continue;
            let minDist = Infinity;
            for (const sel of selected) {
              const d = colorDistance(candidates[i], sel);
              if (d < minDist) minDist = d;
            }
            if (minDist > bestMinDist) {
              bestMinDist = minDist;
              bestIndex = i;
            }
          }

          if (bestIndex === -1) break;
          selected.push(candidates[bestIndex]);
          used.add(bestIndex);
        }

        return selected;
      }

      function largestChannelRange(box) {
        let rMin = 255, rMax = 0, gMin = 255, gMax = 0, bMin = 255, bMax = 0;
        for (const [r, g, b] of box.pixels) {
          if (r < rMin) rMin = r; if (r > rMax) rMax = r;
          if (g < gMin) gMin = g; if (g > gMax) gMax = g;
          if (b < bMin) bMin = b; if (b > bMax) bMax = b;
        }
        return Math.max(rMax - rMin, gMax - gMin, bMax - bMin);
      }

      function widestChannel(box) {
        let rMin = 255, rMax = 0, gMin = 255, gMax = 0, bMin = 255, bMax = 0;
        for (const [r, g, b] of box.pixels) {
          if (r < rMin) rMin = r; if (r > rMax) rMax = r;
          if (g < gMin) gMin = g; if (g > gMax) gMax = g;
          if (b < bMin) bMin = b; if (b > bMax) bMax = b;
        }
        const rR = rMax - rMin, gR = gMax - gMin, bR = bMax - bMin;
        if (rR >= gR && rR >= bR) return 0;
        if (gR >= rR && gR >= bR) return 1;
        return 2;
      }

      // ── DOM references ──

      const previewFrame = document.querySelector("[data-preview-frame]");
      const previewImage = document.querySelector("[data-preview-image]");
      const previewStatus = document.querySelector("[data-preview-status]");
      const emptyState = document.querySelector("[data-empty-state]");
      const emptyBrowse = document.querySelector("[data-empty-browse-button]");
      const fileInput = document.querySelector("[data-file-input]");
      const formatSelect = document.querySelector("[data-format-select]");
      const copyAllButton = document.querySelector("[data-copy-all-button]");
      const downloadButton = document.querySelector("[data-download-button]");
      const paletteSection = document.querySelector("[data-palette-section]");
      const paletteGrid = document.querySelector("[data-palette-grid]");
      const exportCanvas = document.querySelector("[data-export-canvas]");

      // ── State ──

      let currentImage = null;
      let currentPalette = [];
      let colorFormat = "hex";

      // ── Image loading ──

      function loadImageFromFile(file) {
        if (!file || !file.type.startsWith("image/")) return;

        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            currentImage = img;
            showImage(img, e.target.result);
            extractPalette(img);
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      }

      function showImage(img, src) {
        previewImage.src = src;
        previewImage.style.display = "block";
        emptyState.style.display = "none";
        previewStatus.textContent = `${img.naturalWidth}×${img.naturalHeight}`;
      }

      function extractPalette(img) {
        // Use higher resolution to preserve thin details like text.
        // Nearest-neighbor interpolation prevents small bright features
        // (e.g. white text) from being blurred into the background.
        const maxDim = 400;
        const scale = Math.min(1, maxDim / Math.max(img.naturalWidth, img.naturalHeight));
        const w = Math.round(img.naturalWidth * scale);
        const h = Math.round(img.naturalHeight * scale);

        const canvas = document.createElement("canvas");
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext("2d");
        ctx.imageSmoothingEnabled = false;
        ctx.drawImage(img, 0, 0, w, h);

        const imageData = ctx.getImageData(0, 0, w, h);
        const samples = samplePixels(imageData.data, w * h, 40000);
        const raw = quantize(samples, 6);
        currentPalette = sortByLuminance(raw);

        renderPalette();
        downloadButton.disabled = false;
      }

      // ── Palette rendering ──

      function renderPalette() {
        paletteGrid.innerHTML = "";
        paletteSection.classList.add("is-visible");

        for (const color of currentPalette) {
          const swatch = document.createElement("div");
          swatch.className = "swatch";
          swatch.setAttribute("role", "button");
          swatch.setAttribute("tabindex", "0");

          const colorBlock = document.createElement("div");
          colorBlock.className = "swatch-color";
          colorBlock.style.backgroundColor = rgbToHex(color.r, color.g, color.b);

          const label = document.createElement("div");
          label.className = "swatch-label";
          label.textContent = formatColor(color);

          const copied = document.createElement("div");
          copied.className = "swatch-copied";
          copied.textContent = "Copied!";

          swatch.appendChild(colorBlock);
          swatch.appendChild(label);
          swatch.appendChild(copied);

          swatch.addEventListener("click", () => copyColor(color, copied));
          swatch.addEventListener("keydown", (e) => {
            if (e.key === "Enter" || e.key === " ") {
              e.preventDefault();
              copyColor(color, copied);
            }
          });

          paletteGrid.appendChild(swatch);
        }
      }

      function formatColor(color) {
        if (colorFormat === "rgb") {
          return formatRgb(color.r, color.g, color.b);
        }
        return rgbToHex(color.r, color.g, color.b);
      }

      async function copyColor(color, copiedEl) {
        const text = formatColor(color);
        try {
          await navigator.clipboard.writeText(text);
          copiedEl.classList.add("is-visible");
          setTimeout(() => copiedEl.classList.remove("is-visible"), 1200);
        } catch {
          // Fallback: select-and-copy not needed for modern browsers
        }
      }

      // ── Palette card export ──

      function downloadPaletteCard() {
        if (!currentImage || currentPalette.length === 0) return;

        const cardWidth = 1200;
        const imageHeight = 600;
        const paletteBarHeight = 160;
        const labelHeight = 60;
        const cardHeight = imageHeight + paletteBarHeight + labelHeight;

        const canvas = exportCanvas;
        canvas.width = cardWidth;
        canvas.height = cardHeight;
        const ctx = canvas.getContext("2d");

        // Background
        ctx.fillStyle = "#121826";
        ctx.fillRect(0, 0, cardWidth, cardHeight);

        // Draw source image (cover-fit into top area)
        const imgRatio = currentImage.naturalWidth / currentImage.naturalHeight;
        const areaRatio = cardWidth / imageHeight;
        let sx = 0, sy = 0, sw = currentImage.naturalWidth, sh = currentImage.naturalHeight;

        if (imgRatio > areaRatio) {
          sw = currentImage.naturalHeight * areaRatio;
          sx = (currentImage.naturalWidth - sw) / 2;
        } else {
          sh = currentImage.naturalWidth / areaRatio;
          sy = (currentImage.naturalHeight - sh) / 2;
        }

        ctx.drawImage(currentImage, sx, sy, sw, sh, 0, 0, cardWidth, imageHeight);

        // Draw palette swatches
        const swatchCount = currentPalette.length;
        const gap = 16;
        const totalGaps = gap * (swatchCount + 1);
        const swatchSize = Math.min(120, (cardWidth - totalGaps) / swatchCount);
        const totalWidth = swatchCount * swatchSize + (swatchCount - 1) * gap;
        let x = (cardWidth - totalWidth) / 2;
        const y = imageHeight + (paletteBarHeight - swatchSize) / 2;

        for (const color of currentPalette) {
          ctx.fillStyle = rgbToHex(color.r, color.g, color.b);

          // Rounded rectangle
          const r = 12;
          ctx.beginPath();
          ctx.moveTo(x + r, y);
          ctx.lineTo(x + swatchSize - r, y);
          ctx.quadraticCurveTo(x + swatchSize, y, x + swatchSize, y + r);
          ctx.lineTo(x + swatchSize, y + swatchSize - r);
          ctx.quadraticCurveTo(x + swatchSize, y + swatchSize, x + swatchSize - r, y + swatchSize);
          ctx.lineTo(x + r, y + swatchSize);
          ctx.quadraticCurveTo(x, y + swatchSize, x, y + swatchSize - r);
          ctx.lineTo(x, y + r);
          ctx.quadraticCurveTo(x, y, x + r, y);
          ctx.closePath();
          ctx.fill();

          // Label below swatch
          ctx.fillStyle = "#9ca8c7";
          ctx.font = "600 14px 'Segoe UI', Roboto, sans-serif";
          ctx.textAlign = "center";
          const label = rgbToHex(color.r, color.g, color.b);
          ctx.fillText(label, x + swatchSize / 2, y + swatchSize + 24);

          x += swatchSize + gap;
        }

        // Download
        const link = document.createElement("a");
        link.download = "palette.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
      }

      // ── Event wiring ──

      fileInput.addEventListener("change", (e) => {
        if (e.target.files && e.target.files[0]) {
          loadImageFromFile(e.target.files[0]);
        }
      });

      emptyBrowse.addEventListener("click", () => fileInput.click());

      formatSelect.addEventListener("change", (e) => {
        colorFormat = e.target.value;
        if (currentPalette.length > 0) {
          renderPalette();
        }
      });

      copyAllButton.addEventListener("click", async () => {
        if (currentPalette.length === 0) return;

        const values = currentPalette
          .map((c) => formatColor(c))
          .join("\n");

        try {
          await navigator.clipboard.writeText(values);
          const original = copyAllButton.textContent;
          copyAllButton.textContent = "Copied!";
          setTimeout(() => { copyAllButton.textContent = original; }, 1200);
        } catch {
          // Clipboard API unavailable
        }
      });

      downloadButton.addEventListener("click", downloadPaletteCard);

      // Drag-and-drop
      previewFrame.addEventListener("dragover", (e) => {
        e.preventDefault();
        previewFrame.classList.add("is-drop-target");
      });

      previewFrame.addEventListener("dragleave", () => {
        previewFrame.classList.remove("is-drop-target");
      });

      previewFrame.addEventListener("drop", (e) => {
        e.preventDefault();
        previewFrame.classList.remove("is-drop-target");
        const file = e.dataTransfer?.files?.[0];
        if (file) loadImageFromFile(file);
      });
    </script>
  </body>
</html>
