<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>flow</title>
    <style>
      /* ------------------------------------------------------------------ */
      /* Design tokens — shared with the rest of Vibe Tools                 */
      /* ------------------------------------------------------------------ */
      :root {
        --bg-top: #121826;
        --bg-bottom: #1d2742;
        --panel: rgba(16, 22, 36, 0.76);
        --panel-border: rgba(160, 190, 255, 0.16);
        --text: #eef2ff;
        --muted: #9ca8c7;
        --muted-strong: #c6d0ea;
        --accent: #7de2ff;
        --accent-strong: #4db9ff;
        --accent-soft: rgba(125, 226, 255, 0.14);
        --shadow: 0 24px 80px rgba(6, 10, 20, 0.42);
        --radius-xl: 24px;
        --radius-lg: 18px;
        --radius-md: 14px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top, rgba(125, 226, 255, 0.16), transparent 28%),
          linear-gradient(145deg, var(--bg-top), var(--bg-bottom));
        transition: background-color 120ms linear;
      }

      /* ------------------------------------------------------------------ */
      /* Shared layout                                                       */
      /* ------------------------------------------------------------------ */

      .page {
        width: min(700px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 40px 0 72px;
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 24px;
        color: var(--muted);
        text-decoration: none;
        font-size: 0.95rem;
        transition: color 140ms ease, transform 140ms ease;
      }

      .back-link:hover,
      .back-link:focus-visible {
        color: var(--accent-strong);
        outline: none;
        transform: translateX(-2px);
      }

      .hero {
        margin-bottom: 32px;
      }

      .hero h1 {
        margin: 0 0 10px;
        font-size: clamp(2.4rem, 6vw, 4rem);
        line-height: 0.93;
        letter-spacing: -0.05em;
      }

      .hero p {
        margin: 0;
        max-width: 52ch;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.65;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: var(--radius-xl);
        box-shadow: var(--shadow);
        backdrop-filter: blur(22px);
        padding: 28px 28px 32px;
      }

      /* ------------------------------------------------------------------ */
      /* Buttons                                                             */
      /* ------------------------------------------------------------------ */

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 12px 28px;
        border: none;
        border-radius: 999px;
        font-family: inherit;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 140ms ease, transform 120ms ease, box-shadow 140ms ease;
        text-decoration: none;
      }

      .btn:active {
        transform: scale(0.97);
      }

      .btn-primary {
        background: linear-gradient(135deg, var(--accent), var(--accent-strong));
        color: #0a1020;
      }

      .btn-primary:hover {
        opacity: 0.88;
        box-shadow: 0 8px 28px rgba(77, 185, 255, 0.32);
      }

      .btn-secondary {
        background: transparent;
        color: var(--muted-strong);
        border: 1px solid var(--panel-border);
      }

      .btn-secondary:hover {
        border-color: rgba(125, 226, 255, 0.32);
        color: var(--text);
      }

      /* ------------------------------------------------------------------ */
      /* Settings controls                                                   */
      /* ------------------------------------------------------------------ */

      .settings-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px 24px;
        margin-bottom: 24px;
      }

      @media (max-width: 420px) {
        .settings-grid {
          grid-template-columns: 1fr;
        }
      }

      .setting-row {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .setting-label {
        font-size: 0.88rem;
        color: var(--muted-strong);
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      /* Number input with unit suffix */
      .num-input-wrap {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .num-input {
        width: 88px;
        padding: 8px 14px;
        background: rgba(8, 12, 22, 0.5);
        border: 1px solid var(--panel-border);
        border-radius: var(--radius-md);
        color: var(--text);
        font-family: inherit;
        font-size: 1rem;
        font-variant-numeric: tabular-nums;
        outline: none;
        transition: border-color 140ms ease;
        -moz-appearance: textfield;
        appearance: textfield;
      }

      .num-input::-webkit-inner-spin-button,
      .num-input::-webkit-outer-spin-button {
        -webkit-appearance: none;
      }

      .num-input:focus {
        border-color: rgba(125, 226, 255, 0.45);
      }

      .num-input.invalid {
        border-color: rgba(255, 100, 100, 0.6);
      }

      .num-unit {
        font-size: 0.92rem;
        color: var(--muted);
      }

      /* Checkboxes */
      .checks {
        display: grid;
        gap: 12px;
        margin-bottom: 28px;
      }

      .check-row {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        cursor: pointer;
      }

      .check-row input[type="checkbox"] {
        appearance: none;
        -webkit-appearance: none;
        width: 18px;
        height: 18px;
        min-width: 18px;
        border: 1px solid var(--panel-border);
        border-radius: 5px;
        background: transparent;
        cursor: pointer;
        margin-top: 1px;
        transition: background 120ms ease, border-color 120ms ease;
        position: relative;
      }

      .check-row input[type="checkbox"]:checked {
        background: var(--accent-soft);
        border-color: rgba(125, 226, 255, 0.5);
      }

      .check-row input[type="checkbox"]:checked::after {
        content: "";
        position: absolute;
        inset: 3px;
        background: var(--accent);
        border-radius: 2px;
      }

      .check-text {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .check-title {
        font-size: 0.95rem;
        color: var(--text);
      }

      .check-desc {
        font-size: 0.84rem;
        color: var(--muted);
        line-height: 1.5;
      }

      /* ------------------------------------------------------------------ */
      /* Writing screen                                                      */
      /* ------------------------------------------------------------------ */

      #screen-writing {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 10;
      }

      #writing-textarea {
        position: absolute;
        inset: 0;
        width: 100%;
        max-width: 70ch;
        height: 100%;
        margin: 0 auto;
        padding: 60px 20px;
        background: transparent;
        border: none;
        outline: none;
        resize: none;
        color: var(--text);
        font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        font-size: clamp(1.1rem, 2.2vw, 1.35rem);
        line-height: 1.75;
        caret-color: var(--accent);
      }

      #writing-textarea::placeholder {
        color: rgba(156, 168, 199, 0.35);
      }

      /* Invisible mode */
      #writing-textarea.invisible {
        color: transparent;
        caret-color: var(--accent);
        text-shadow: none;
      }

      /* Warning overlay */
      #warning-overlay {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 11;
        background: transparent;
        transition: background 80ms linear;
      }

      /* Timers HUD */
      #timers-hud {
        position: fixed;
        top: 18px;
        right: 22px;
        z-index: 12;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 4px;
        pointer-events: none;
      }

      .hud-timer {
        font-size: 0.88rem;
        color: var(--muted);
        font-variant-numeric: tabular-nums;
        letter-spacing: 0.03em;
        opacity: 0.7;
      }

      #inactivity-hud {
        display: block;
      }

      /* ------------------------------------------------------------------ */
      /* Toast notification                                                  */
      /* ------------------------------------------------------------------ */

      .toast {
        position: fixed;
        top: 24px;
        left: 50%;
        transform: translateX(-50%) translateY(-8px);
        background: rgba(180, 40, 40, 0.35);
        border: 1px solid rgba(255, 100, 100, 0.25);
        backdrop-filter: blur(16px);
        color: var(--text);
        font-size: 0.95rem;
        padding: 12px 24px;
        border-radius: 999px;
        z-index: 30;
        opacity: 0;
        pointer-events: none;
        transition: opacity 300ms ease, transform 300ms ease;
      }

      .toast.visible {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      /* ------------------------------------------------------------------ */
      /* Success screen                                                      */
      /* ------------------------------------------------------------------ */

      #screen-success {
        display: none;
      }

      .stat-cards {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-bottom: 24px;
      }

      .stat-card {
        background: var(--accent-soft);
        border: 1px solid rgba(125, 226, 255, 0.18);
        border-radius: var(--radius-md);
        padding: 12px 18px;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .stat-value {
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        color: var(--accent);
      }

      .stat-label {
        font-size: 0.8rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .success-text {
        width: 100%;
        min-height: 180px;
        max-height: 40dvh;
        padding: 16px;
        background: rgba(8, 12, 22, 0.5);
        border: 1px solid var(--panel-border);
        border-radius: var(--radius-md);
        color: var(--text);
        font-family: inherit;
        font-size: 0.97rem;
        line-height: 1.7;
        resize: vertical;
        outline: none;
        margin-bottom: 20px;
      }

      .action-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      /* ------------------------------------------------------------------ */
      /* Responsive                                                          */
      /* ------------------------------------------------------------------ */

      @media (max-width: 600px) {
        .page {
          padding-top: 28px;
          padding-bottom: 48px;
        }

        .panel {
          padding: 20px 18px 24px;
        }

        #writing-textarea {
          padding: 48px 16px 120px;
          font-size: 1.05rem;
        }

        .action-row {
          flex-direction: column;
        }

        .action-row .btn {
          width: 100%;
        }
      }

      /* ------------------------------------------------------------------ */
      /* Utility                                                             */
      /* ------------------------------------------------------------------ */

      .stealth-link {
        color: inherit;
        text-decoration: none;
      }

      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <!-- ================================================================== -->
    <!-- START SCREEN                                                        -->
    <!-- ================================================================== -->
    <div id="screen-start">
      <main class="page">
        <a class="back-link" href="index.html">← all tools</a>

        <section class="hero">
          <h1>flow</h1>
          <p><a class="stealth-link" href="https://genius.com/7956166">Write like you're running out of time.</a></p>
        </section>

        <div class="panel">
          <div class="settings-grid">
            <!-- Session duration -->
            <div class="setting-row">
              <label class="setting-label" for="input-duration">Session duration</label>
              <div class="num-input-wrap">
                <input
                  class="num-input"
                  type="number"
                  id="input-duration"
                  value="5"
                  min="1"
                  step="1"
                />
                <span class="num-unit">minutes</span>
              </div>
            </div>

            <!-- Inactivity timeout -->
            <div class="setting-row">
              <label class="setting-label" for="input-timeout">Inactivity timeout</label>
              <div class="num-input-wrap">
                <input
                  class="num-input"
                  type="number"
                  id="input-timeout"
                  value="5"
                  min="1"
                  step="1"
                />
                <span class="num-unit">seconds</span>
              </div>
            </div>
          </div>

          <!-- Checkboxes -->
          <div class="checks">
            <label class="check-row">
              <input type="checkbox" id="chk-soft-mode" />
              <span class="check-text">
                <span class="check-title">Soft mode</span>
                <span class="check-desc">On timeout, only the last paragraph is erased. The session continues.</span>
              </span>
            </label>

            <label class="check-row">
              <input type="checkbox" id="chk-invisible-mode" />
              <span class="check-text">
                <span class="check-title">Invisible mode</span>
                <span class="check-desc">Text is hidden while writing. Revealed only after a successful finish.</span>
              </span>
            </label>

            <label class="check-row">
              <input type="checkbox" id="chk-zen-mode" />
              <span class="check-text">
                <span class="check-title">Zen mode</span>
                <span class="check-desc">Hides all timers for a distraction-free experience.</span>
              </span>
            </label>
          </div>

          <button class="btn btn-primary" id="btn-start" style="width:100%">Start</button>
        </div>
      </main>
    </div>

    <!-- ================================================================== -->
    <!-- WRITING SCREEN                                                      -->
    <!-- ================================================================== -->
    <div id="screen-writing">
      <textarea
        id="writing-textarea"
        placeholder="Go"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
      ></textarea>

      <div id="warning-overlay"></div>

      <div id="timers-hud">
        <span class="hud-timer" id="session-hud">5:00</span>
        <span class="hud-timer" id="inactivity-hud">5 s</span>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <!-- ================================================================== -->
    <!-- SUCCESS SCREEN                                                      -->
    <!-- ================================================================== -->
    <div id="screen-success">
      <main class="page">
        <a class="back-link" href="index.html">← all tools</a>

        <section class="hero">
          <h1>flow</h1>
          <p>Session complete. Your words survived.</p>
        </section>

        <div class="panel">
          <div class="stat-cards">
            <div class="stat-card">
              <span class="stat-value" id="stat-words">0</span>
              <span class="stat-label">Words</span>
            </div>
            <div class="stat-card">
              <span class="stat-value" id="stat-chars">0</span>
              <span class="stat-label">Characters</span>
            </div>
          </div>

          <textarea class="success-text" id="success-text" readonly></textarea>

          <div class="action-row">
            <button class="btn btn-primary"   id="btn-copy">Copy text</button>
            <button class="btn btn-secondary" id="btn-download">Download .txt</button>
            <button class="btn btn-secondary" id="btn-new-session">New session</button>
          </div>
        </div>
      </main>
    </div>

    <!-- ================================================================== -->
    <!-- Script                                                              -->
    <!-- ================================================================== -->
    <script>
      // ---- Core logic (inlined from src/flow.js) ----

      const STATE = { START: "start", WRITING: "writing", SUCCESS: "success", FAILURE: "failure" };

      const DEFAULT_CONFIG = { duration: 5, timeout: 5, zenMode: false, softMode: false, invisibleMode: false };

      function eraseLastParagraph(text) {
        const trimmed = text.replace(/(\n\n)+$/, "");
        const idx = trimmed.lastIndexOf("\n\n");
        if (idx === -1) return "";
        return trimmed.slice(0, idx + 2);
      }

      function computeInactivityProgress(elapsedMs, timeoutMs) {
        if (timeoutMs <= 0) return 1;
        return Math.min(1, Math.max(0, elapsedMs / timeoutMs));
      }

      function createSession(config) {
        const cfg = Object.assign({}, DEFAULT_CONFIG, config);
        return { state: STATE.START, config: cfg, text: "", _sessionElapsedMs: 0, _inactivityElapsedMs: 0 };
      }

      function startSession(session) {
        return { ...session, state: STATE.WRITING, text: "", _sessionElapsedMs: 0, _inactivityElapsedMs: 0 };
      }

      function onKeystroke(session, text) {
        return { ...session, text, _inactivityElapsedMs: 0 };
      }

      function tick(session, deltaMs) {
        if (session.state !== STATE.WRITING) return session;
        const sessionElapsedMs    = session._sessionElapsedMs + deltaMs;
        const inactivityElapsedMs = session._inactivityElapsedMs + deltaMs;
        const sessionDurationMs   = session.config.duration * 60 * 1000;
        const timeoutMs           = session.config.timeout * 1000;
        if (sessionElapsedMs >= sessionDurationMs) {
          return { ...session, state: STATE.SUCCESS, _sessionElapsedMs: sessionDurationMs, _inactivityElapsedMs: inactivityElapsedMs };
        }
        if (inactivityElapsedMs >= timeoutMs) {
          if (session.config.softMode) {
            const newText = eraseLastParagraph(session.text);
            if (newText === "" && session.text !== "") {
              return { ...session, state: STATE.FAILURE, text: "", _inactivityElapsedMs: 0 };
            }
            return { ...session, text: newText, _inactivityElapsedMs: 0, _sessionElapsedMs: sessionElapsedMs };
          }
          return { ...session, state: STATE.FAILURE, text: "", _sessionElapsedMs: sessionElapsedMs, _inactivityElapsedMs: timeoutMs };
        }
        return { ...session, _sessionElapsedMs: sessionElapsedMs, _inactivityElapsedMs: inactivityElapsedMs };
      }

      function getInactivityProgress(session) {
        return computeInactivityProgress(session._inactivityElapsedMs, session.config.timeout * 1000);
      }

      function getSessionRemainingMs(session) {
        return Math.max(0, session.config.duration * 60 * 1000 - session._sessionElapsedMs);
      }

      function getInactivityRemainingMs(session) {
        return Math.max(0, session.config.timeout * 1000 - session._inactivityElapsedMs);
      }

      function computeWarningColor(progress) {
        const THRESHOLD = 0.5;
        if (progress <= THRESHOLD) return null;
        const intensity = (progress - THRESHOLD) / (1 - THRESHOLD);
        const alpha = (intensity * 0.55).toFixed(3);
        return "rgba(0,0,0," + alpha + ")";
      }

      function formatTime(ms) {
        const totalSeconds = Math.ceil(ms / 1000);
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = totalSeconds % 60;
        return minutes + ":" + String(seconds).padStart(2, "0");
      }

      function countWords(text) {
        const trimmed = text.trim();
        if (!trimmed) return 0;
        return trimmed.split(/\s+/).length;
      }

      function countChars(text) {
        return text.length;
      }

      // ---- DOM refs ----
      const screens = {
        start:   document.getElementById("screen-start"),
        writing: document.getElementById("screen-writing"),
        success: document.getElementById("screen-success"),
      };

      const textarea        = document.getElementById("writing-textarea");
      const warningOverlay  = document.getElementById("warning-overlay");
      const sessionHud      = document.getElementById("session-hud");
      const inactivityHud   = document.getElementById("inactivity-hud");

      const btnStart      = document.getElementById("btn-start");
      const btnCopy       = document.getElementById("btn-copy");
      const btnDownload   = document.getElementById("btn-download");
      const btnNewSession = document.getElementById("btn-new-session");

      const statWords = document.getElementById("stat-words");
      const statChars = document.getElementById("stat-chars");
      const successText = document.getElementById("success-text");

      const chkZenMode       = document.getElementById("chk-zen-mode");
      const chkSoftMode      = document.getElementById("chk-soft-mode");
      const chkInvisibleMode = document.getElementById("chk-invisible-mode");

      // ---- State ----
      let session = createSession();
      let rafId   = null;
      let lastTs  = null;

      // ---- Screen management ----
      const toastEl = document.getElementById("toast");
      let toastTimer = null;

      function showScreen(name) {
        for (const [key, el] of Object.entries(screens)) {
          el.style.display = key === name ? "block" : "none";
        }
      }

      function showToast(message, durationMs = 3000) {
        clearTimeout(toastTimer);
        toastEl.textContent = message;
        toastEl.classList.add("visible");
        toastTimer = setTimeout(() => toastEl.classList.remove("visible"), durationMs);
      }

      // ---- Read config from UI ----
      const inputDuration = document.getElementById("input-duration");
      const inputTimeout  = document.getElementById("input-timeout");

      function parsePositiveInt(input) {
        const v = Math.floor(Number(input.value));
        return (Number.isFinite(v) && v >= 1) ? v : null;
      }

      function readConfig() {
        const duration = parsePositiveInt(inputDuration);
        const timeout  = parsePositiveInt(inputTimeout);

        inputDuration.classList.toggle("invalid", duration === null);
        inputTimeout.classList.toggle("invalid",  timeout  === null);

        if (duration === null || timeout === null) return null;

        return {
          duration,
          timeout,
          zenMode:       chkZenMode.checked,
          softMode:      chkSoftMode.checked,
          invisibleMode: chkInvisibleMode.checked,
        };
      }

      // ---- RAF loop ----
      function loop(ts) {
        if (lastTs === null) lastTs = ts;
        const delta = ts - lastTs;
        lastTs = ts;

        session = tick(session, delta);
        updateHud();

        if (session.state === STATE.WRITING) {
          rafId = requestAnimationFrame(loop);
        } else if (session.state === STATE.FAILURE) {
          stopLoop();
          transitionToFailure();
        } else if (session.state === STATE.SUCCESS) {
          stopLoop();
          transitionToSuccess();
        }
      }

      function stopLoop() {
        if (rafId !== null) {
          cancelAnimationFrame(rafId);
          rafId = null;
        }
        lastTs = null;
      }

      // ---- HUD update ----
      function updateHud() {
        const remainingMs = getSessionRemainingMs(session);
        sessionHud.textContent = formatTime(remainingMs);

        const progress = getInactivityProgress(session);
        const color = computeWarningColor(progress);
        warningOverlay.style.background = color ?? "transparent";

        if (!session.config.zenMode) {
          const inactMs = getInactivityRemainingMs(session);
          inactivityHud.textContent = Math.ceil(inactMs / 1000) + " s";
        }

        // Sync textarea text if soft mode erased a paragraph
        if (textarea.value !== session.text) {
          textarea.value = session.text;
        }
      }

      // ---- Transitions ----
      let waitingForFirstKeystroke = false;

      function transitionToWriting() {
        const config = readConfig();
        if (!config) return;

        session = startSession(createSession(config));

        textarea.value = "";
        textarea.classList.toggle("invisible", config.invisibleMode);

        const showTimers = !config.zenMode;
        sessionHud.style.display    = showTimers ? "block" : "none";
        inactivityHud.style.display = showTimers ? "block" : "none";

        warningOverlay.style.background = "transparent";

        showScreen("writing");
        textarea.focus();

        waitingForFirstKeystroke = true;
      }

      function beginTimers() {
        waitingForFirstKeystroke = false;
        lastTs = null;
        rafId = requestAnimationFrame(loop);
      }

      function transitionToFailure() {
        transitionToStart();
        showToast("Text lost — you paused too long.");
      }

      function transitionToSuccess() {
        const text = session.text;
        successText.value = text;
        statWords.textContent = countWords(text);
        statChars.textContent = countChars(text);
        showScreen("success");
      }

      function transitionToStart() {
        stopLoop();
        session = createSession();
        warningOverlay.style.background = "transparent";
        showScreen("start");
      }

      // ---- Event listeners ----
      btnStart.addEventListener("click", transitionToWriting);
      btnNewSession.addEventListener("click", transitionToStart);

      document.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && session.state === STATE.START && !e.target.matches("textarea")) {
          e.preventDefault();
          transitionToWriting();
        }
      });

      textarea.addEventListener("input", () => {
        if (waitingForFirstKeystroke) beginTimers();
        session = onKeystroke(session, textarea.value);
        warningOverlay.style.background = "transparent";
      });

      // Prevent accidental tab-out / back navigation during writing
      textarea.addEventListener("keydown", (e) => {
        if (e.key === "Tab") {
          e.preventDefault();
          const start = textarea.selectionStart;
          const end   = textarea.selectionEnd;
          textarea.value =
            textarea.value.slice(0, start) + "    " + textarea.value.slice(end);
          textarea.selectionStart = textarea.selectionEnd = start + 4;
          session = onKeystroke(session, textarea.value);
        }
      });

      btnCopy.addEventListener("click", async () => {
        try {
          await navigator.clipboard.writeText(session.text);
          const orig = btnCopy.textContent;
          btnCopy.textContent = "Copied!";
          setTimeout(() => { btnCopy.textContent = orig; }, 1800);
        } catch {
          // Fallback: select text
          successText.select();
          document.execCommand("copy");
        }
      });

      btnDownload.addEventListener("click", () => {
        const blob = new Blob([session.text], { type: "text/plain" });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement("a");
        a.href     = url;
        a.download = "flow-session.txt";
        a.click();
        URL.revokeObjectURL(url);
      });

      // ---- Mobile viewport fix ----
      // Keep the writing textarea sized to the visual viewport
      // so the virtual keyboard doesn't push content off-screen.
      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", () => {
          if (session.state === STATE.WRITING) {
            const vv = window.visualViewport;
            screens.writing.style.height = vv.height + "px";
            screens.writing.style.top    = vv.offsetTop + "px";
          }
        });
      }

      // ---- Persist settings ----
      const STORAGE_KEY = "flow-settings";

      function saveSettings() {
        const data = {
          duration:      inputDuration.value,
          timeout:       inputTimeout.value,
          zenMode:       chkZenMode.checked,
          softMode:      chkSoftMode.checked,
          invisibleMode: chkInvisibleMode.checked,
        };
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {}
      }

      function loadSettings() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return;
          const data = JSON.parse(raw);
          if (data.duration)      inputDuration.value     = data.duration;
          if (data.timeout)       inputTimeout.value      = data.timeout;
          if (data.zenMode !== undefined)       chkZenMode.checked       = data.zenMode;
          if (data.softMode !== undefined)      chkSoftMode.checked      = data.softMode;
          if (data.invisibleMode !== undefined) chkInvisibleMode.checked = data.invisibleMode;
        } catch {}
      }

      for (const el of [inputDuration, inputTimeout, chkZenMode, chkSoftMode, chkInvisibleMode]) {
        el.addEventListener("change", saveSettings);
      }

      // ---- Initial render ----
      loadSettings();
      showScreen("start");
    </script>
  </body>
</html>
